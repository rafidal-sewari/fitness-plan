<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Plan">
<meta name="theme-color" content="#0f0f0f">
<title>My Fitness Plan</title>
<style>
  :root {
    --bg:          #000000;
    --bg2:         #1c1c1e;
    --bg3:         #2c2c2e;
    --bg4:         #3a3a3c;
    --border:      rgba(255,255,255,0.08);
    --border2:     rgba(255,255,255,0.12);
    --text:        #ffffff;
    --text2:       rgba(255,255,255,0.55);
    --text3:       rgba(255,255,255,0.3);
    --blue:        #0a84ff;
    --blue-bg:     rgba(10,132,255,0.14);
    --blue-border: rgba(10,132,255,0.28);
    --green:       #30d158;
    --green-bg:    rgba(48,209,88,0.14);
    --green-border:rgba(48,209,88,0.28);
    --amber:       #ff9f0a;
    --amber-bg:    rgba(255,159,10,0.14);
    --amber-border:rgba(255,159,10,0.28);
    --red:         #ff453a;
    --red-bg:      rgba(255,69,58,0.12);
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);

    /* flat defaults */
    --radius-card: 22px;
    --radius-btn:  14px;
    --radius-input:12px;
    --glass-tint:        rgba(255,255,255,0.06);
    --glass-tint-strong: rgba(255,255,255,0.11);
    --glass-edge-top:    rgba(255,255,255,0.55);
    --glass-edge-bottom: rgba(255,255,255,0.06);
    --glass-shadow-out:  0 14px 38px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
    --glass-shadow-in:   inset 0 1px 1px rgba(255,255,255,0.5), inset 0 -1.5px 3px rgba(0,0,0,0.28), inset 0 0 0 1px rgba(255,255,255,0.05);
    --glass-blur:        blur(28px) saturate(190%) brightness(1.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  /* ── APP SHELL ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; position: relative; z-index: 1; }

  /* ── THEME TOGGLE ── */
  #theme-toggle-wrap {
    position: fixed;
    top: calc(14px + var(--safe-top));
    right: 16px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #theme-toggle-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    pointer-events: none;
    transition: color 0.3s;
    white-space: nowrap;
  }
  #theme-toggle {
    width: 44px;
    height: 26px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    position: relative;
    transition: background 0.35s ease;
    background: rgba(255,255,255,0.12);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 2px 8px rgba(0,0,0,0.3);
    flex-shrink: 0;
  }
  #theme-toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }
  body.theme-glass #theme-toggle {
    background: var(--blue);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 2px 10px rgba(10,132,255,0.4);
  }
  body.theme-glass #theme-toggle::after {
    transform: translateX(18px);
  }
  body.theme-glass #theme-toggle-label {
    color: var(--text2);
  }

  /* ── HEADER ── */
  #header {
    padding: 12px 20px 14px;
    padding-top: calc(12px + var(--safe-top));
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative; z-index: 5;
    /* flat */
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 0.5px solid var(--border2);
    box-shadow: none;
    transition: background 0.35s, box-shadow 0.35s, border-color 0.35s;
  }
  body.theme-glass #header {
    background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03)), rgba(20,20,22,0.42);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-bottom: 0.5px solid var(--glass-edge-bottom);
    box-shadow: inset 0 1px 0 var(--glass-edge-top), 0 1px 16px rgba(0,0,0,0.25);
  }
  #header-back {
    display: none;
    align-items: center;
    gap: 3px;
    color: var(--blue);
    font-size: 17px;
    font-weight: 400;
    cursor: pointer;
    flex-shrink: 0;
    padding: 4px 0;
  }
  #header-back svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  #header-back.visible { display: flex; }
  #header-titles { flex: 1; }
  #header-titles h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; line-height: 1.2; }
  #header-titles p  { font-size: 12px; color: var(--text2); margin-top: 1px; font-weight: 400; letter-spacing: 0.01em; }

  /* ── CONTENT + VIEWS ── */
  #content { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; }
  .view {
    display: flex; flex: 1; flex-direction: column;
    position: absolute; inset: 0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.4,0,0.2,1);
    will-change: transform, opacity;
  }
  .view.active { opacity: 1; pointer-events: auto; transform: translateX(0) !important; }
  .view.slide-from-right { transform: translateX(5%); }
  .view.slide-from-left  { transform: translateX(-5%); }

  /* ── TAB BAR ── */
  #tab-bar {
    flex-shrink: 0;
    padding: 10px 16px calc(12px + var(--safe-bottom));
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: transparent;
  }
  #tab-bar::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to top, #000 55%, transparent);
    pointer-events: none;
    transition: background 0.35s;
  }
  body.theme-glass #tab-bar::before {
    background: linear-gradient(to top, rgba(4,4,6,0.85) 45%, transparent);
  }
  #tab-bar-inner {
    position: relative; z-index: 1;
    display: flex; align-items: center;
    border-radius: 100px;
    padding: 4px;
    gap: 2px;
    max-width: calc(100vw - 32px);
    flex-wrap: nowrap;
    user-select: none;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    /* flat */
    background: rgba(28,28,30,0.9);
    backdrop-filter: blur(28px) saturate(200%);
    -webkit-backdrop-filter: blur(28px) saturate(200%);
    border: 0.5px solid rgba(255,255,255,0.12);
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 32px rgba(0,0,0,0.5);
    transition: background 0.35s, box-shadow 0.35s, border-color 0.35s;
  }
  body.theme-glass #tab-bar-inner {
    background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04)), rgba(30,30,32,0.45);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 0.5px solid rgba(255,255,255,0.16);
    box-shadow:
      inset 0 1.5px 1px rgba(255,255,255,0.55),
      inset 0 -1px 2px rgba(0,0,0,0.25),
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 14px 36px rgba(0,0,0,0.5),
      0 2px 10px rgba(0,0,0,0.35);
  }
  #tab-bar-inner::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 7px 15px;
    gap: 2px;
    border: none; background: none;
    color: rgba(255,255,255,0.35);
    cursor: pointer;
    border-radius: 100px;
    min-height: 42px;
    transition: color 0.22s ease, background 0.22s ease;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    position: relative; z-index: 1;
  }
  .tab-label { font-size: 12px; font-weight: 600; letter-spacing: -0.15px; }
  .tab-sub   { font-size: 9px; font-weight: 500; opacity: 0.65; }
  .tab-btn.active { color: #fff; }
  .tab-btn.drag-hover { color: rgba(255,255,255,0.65); }

  /* Sliding pill */
  #tab-pill {
    position: absolute;
    top: 4px;
    height: calc(100% - 8px);
    border-radius: 100px;
    pointer-events: none;
    z-index: 0;
    will-change: left, width, background-color;
    transition: box-shadow 0.35s, border 0.35s;
  }
  body.theme-glass #tab-pill {
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.45),
      inset 0 -1px 1px rgba(0,0,0,0.18),
      0 2px 8px rgba(0,0,0,0.25);
    border: 0.5px solid rgba(255,255,255,0.18);
  }

  /* ── DAY CARDS ── */
  #view-days { padding: 16px 0 16px; }
  .day-scroll {
    display: flex; gap: 12px;
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    flex: 1; align-items: stretch;
    padding: 0 16px;
  }
  .day-scroll::-webkit-scrollbar { display: none; }
  .day-card {
    border-radius: var(--radius-card);
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.12s ease, background 0.35s, border-color 0.35s, box-shadow 0.35s;
    flex-shrink: 0; width: 80vw;
    scroll-snap-align: center;
    user-select: none;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 28px 20px;
    position: relative;
    overflow: hidden;
    /* flat */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid var(--border2);
    box-shadow: none;
  }
  body.theme-glass .day-card {
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 0.5px solid rgba(255,255,255,0.14);
    box-shadow: var(--glass-shadow-in), var(--glass-shadow-out);
  }
  .day-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(125deg, rgba(255,255,255,0.20) 0%, rgba(255,255,255,0.03) 32%, rgba(255,255,255,0) 55%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s;
  }
  body.theme-glass .day-card::before { opacity: 1; }
  .day-card:active { transform: scale(0.97); opacity: 0.85; }
  .day-card .wd-name,
  .day-card .wd-type,
  .day-card .wd-sub { position: relative; z-index: 1; }
  .day-card .wd-name { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .day-card .wd-type { font-size: 34px; font-weight: 700; line-height: 1.1; letter-spacing: -0.5px; }
  .day-card .wd-sub  { font-size: 14px; color: var(--text2); margin-top: 10px; font-weight: 400; }
  .day-card.push { background: linear-gradient(145deg, rgba(10,132,255,0.18) 0%, rgba(10,132,255,0.06) 100%); border-color: rgba(10,132,255,0.2); }
  .day-card.push .wd-type { color: var(--blue); }
  .day-card.pull { background: linear-gradient(145deg, rgba(48,209,88,0.16) 0%, rgba(48,209,88,0.05) 100%); border-color: rgba(48,209,88,0.2); }
  .day-card.pull .wd-type { color: var(--green); }
  .day-card.legs { background: linear-gradient(145deg, rgba(255,159,10,0.16) 0%, rgba(255,159,10,0.05) 100%); border-color: rgba(255,159,10,0.2); }
  .day-card.legs .wd-type { color: var(--amber); }
  /* flat rest */
  body:not(.theme-glass) .day-card.rest { background: var(--bg2); border-color: var(--border); }
  body:not(.theme-glass) .day-card.rest .wd-type { color: var(--text3); }
  /* glass rest */
  body.theme-glass .day-card.rest { background: linear-gradient(145deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 100%); border-color: rgba(255,255,255,0.12); }
  body.theme-glass .day-card.rest .wd-type { color: var(--text3); }

  /* ── EXERCISE CARDS ── */
  #view-exercises { padding: 16px 0; }
  .ex-scroll {
    display: flex; gap: 12px;
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    flex: 1; align-items: stretch;
    padding: 0 16px;
  }
  .ex-scroll::-webkit-scrollbar { display: none; }
  .ex-card {
    border-radius: var(--radius-card);
    flex-shrink: 0; width: 88vw;
    scroll-snap-align: center;
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: background 0.35s, border-color 0.35s, box-shadow 0.35s;
    /* flat */
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }
  body.theme-glass .ex-card {
    border: 0.5px solid rgba(255,255,255,0.14);
    background: linear-gradient(165deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.02) 100%);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    box-shadow: var(--glass-shadow-in), var(--glass-shadow-out);
  }
  .ex-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(125deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.02) 28%, rgba(255,255,255,0) 50%);
    pointer-events: none; z-index: 0;
    opacity: 0;
    transition: opacity 0.35s;
  }
  body.theme-glass .ex-card::before { opacity: 1; }
  .ex-card.push { border-color: rgba(10,132,255,0.2); }
  .ex-card.pull { border-color: rgba(48,209,88,0.18); }
  .ex-card.legs { border-color: rgba(255,159,10,0.18); }
  body.theme-glass .ex-card.push { border-color: rgba(10,132,255,0.28); }
  body.theme-glass .ex-card.pull { border-color: rgba(48,209,88,0.24); }
  body.theme-glass .ex-card.legs { border-color: rgba(255,159,10,0.24); }

  .ex-card-header {
    padding: 18px 18px 14px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    border-bottom: 0.5px solid var(--border2);
    position: relative; z-index: 1;
  }
  .ex-card-name { font-size: 19px; font-weight: 600; line-height: 1.2; flex: 1; letter-spacing: -0.3px; }
  .ex-card-badge {
    font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 20px; flex-shrink: 0; margin-top: 3px; letter-spacing: 0.01em;
  }
  body.theme-glass .ex-card-badge {
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .ex-card-badge.push     { background: var(--blue-bg);  color: var(--blue);  border: 0.5px solid var(--blue-border); }
  .ex-card-badge.pull     { background: var(--green-bg); color: var(--green); border: 0.5px solid var(--green-border); }
  .ex-card-badge.legs     { background: var(--amber-bg); color: var(--amber); border: 0.5px solid var(--amber-border); }
  .ex-card-badge.shoulder { background: var(--amber-bg); color: var(--amber); border: 0.5px solid var(--amber-border); }

  .ex-card-body { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; position: relative; z-index: 1; }
  .ex-card-body::-webkit-scrollbar { display: none; }

  .ex-date-row { display: flex; align-items: center; gap: 10px; }
  .ex-date-label { font-size: 12px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
  .ex-date-input {
    border-radius: var(--radius-input);
    color: var(--text); font-size: 15px; padding: 9px 13px;
    appearance: none; -webkit-appearance: none; flex: 1;
    font-family: inherit;
    /* flat */
    background: var(--bg3); border: 0.5px solid var(--border2);
    transition: background 0.35s, border-color 0.35s;
  }
  body.theme-glass .ex-date-input {
    background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.14);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
  }

  .set-table { display: flex; flex-direction: column; gap: 8px; }
  .set-table-head { display: grid; grid-template-columns: 28px 1fr 1fr; gap: 8px; }
  .set-table-head div { font-size: 11px; color: var(--text3); font-weight: 600; text-align: center; text-transform: uppercase; letter-spacing: 0.05em; }
  .set-table-row { display: grid; grid-template-columns: 28px 1fr 1fr; gap: 8px; align-items: center; }
  .set-table-num { font-size: 13px; color: var(--text3); font-weight: 600; text-align: center; }
  .set-table-row input {
    border-radius: var(--radius-input);
    color: var(--text); font-size: 17px; font-weight: 500; padding: 12px 8px;
    width: 100%; appearance: none; -webkit-appearance: none; text-align: center;
    font-family: inherit;
    /* flat */
    background: var(--bg3); border: 0.5px solid var(--border2);
    transition: background 0.35s, border-color 0.35s, box-shadow 0.35s;
  }
  body.theme-glass .set-table-row input {
    background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.14);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .set-table-row input:focus { outline: none; border-color: var(--blue); background: rgba(10,132,255,0.06); }

  .add-set-btn {
    border-radius: var(--radius-btn);
    color: var(--blue); font-size: 15px; padding: 13px; width: 100%;
    cursor: pointer; font-weight: 600; min-height: 48px; font-family: inherit;
    transition: opacity 0.15s, background 0.35s, border 0.35s;
    /* flat */
    background: var(--bg3); border: none;
  }
  body.theme-glass .add-set-btn {
    background: rgba(10,132,255,0.14); border: 0.5px solid rgba(10,132,255,0.22);
    backdrop-filter: blur(16px) saturate(160%); -webkit-backdrop-filter: blur(16px) saturate(160%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .add-set-btn:active { opacity: 0.7; }

  .ex-save-btn {
    border-radius: var(--radius-btn);
    padding: 15px; font-size: 17px; font-weight: 600; cursor: pointer; width: 100%;
    min-height: 52px; transition: opacity 0.15s, background 0.35s, box-shadow 0.35s, border 0.35s; font-family: inherit; letter-spacing: -0.2px;
    /* flat */
    background: var(--blue); color: #fff; border: none;
  }
  body.theme-glass .ex-save-btn {
    background: linear-gradient(165deg, rgba(40,150,255,0.95), rgba(10,110,235,0.92));
    border: 0.5px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.4), inset 0 -1px 2px rgba(0,0,0,0.15), 0 6px 18px rgba(10,132,255,0.35);
  }
  .ex-save-btn:active { opacity: 0.75; }

  .prev-section { border-top: 0.5px solid var(--border2); padding-top: 14px; }
  .prev-section h4 { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
  .prev-entry { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
  .prev-entry:last-child { border-bottom: none; }
  .prev-entry-date { font-size: 13px; color: var(--text3); font-weight: 400; }
  .prev-entry-sets { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .prev-entry-progress { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .prev-entry-progress.up   { color: var(--green); background: var(--green-bg); }
  .prev-entry-progress.down { color: var(--red);   background: var(--red-bg); }
  .prev-entry-progress.same { color: var(--text3); background: rgba(255,255,255,0.06); }

  /* ── REPLACE MODAL ── */
  .replace-modal {
    position: fixed; inset: 0; z-index: 101;
    display: flex; align-items: flex-end;
    background: rgba(0,0,0,0);
    transition: background 0.3s ease;
  }
  .replace-modal:not(.hidden) { background: rgba(0,0,0,0.6); }
  .replace-modal.hidden { display: none; }
  .replace-modal-content {
    border-radius: 16px 16px 0 0;

// ── Tab drag-to-switch ───────────────────────────────────────────────────────
let _tabDrag = null;
let _tabOnSelect = null;

function _getBtnAt(x, y) {
  const el = document.elementFromPoint(x, y);
  return el ? el.closest('.tab-btn') : null;
}

function _tabBtnIndex(btn) {
  const btns = Array.from(document.querySelectorAll('#tab-bar-inner .tab-btn'));
  return btns.indexOf(btn);
}

(function attachOnce() {
  const inner = document.getElementById('tab-bar-inner');

  inner.addEventListener('touchstart', e => {
    const t = e.touches[0];
    const btn = _getBtnAt(t.clientX, t.clientY);
    if (!btn) return;
    _tabDrag = { startX: t.clientX, startBtn: btn, lastBtn: btn, dragging: false };
  }, { passive: true });

  inner.addEventListener('touchmove', e => {
    if (!_tabDrag) return;
    const t = e.touches[0];
    const dx = Math.abs(t.clientX - _tabDrag.startX);
    if (dx > 6) _tabDrag.dragging = true;
    if (!_tabDrag.dragging) return;
    const btns = Array.from(inner.querySelectorAll('.tab-btn'));
    const innerRect = inner.getBoundingClientRect();
    const x = t.clientX - innerRect.left + inner.scrollLeft;
    const fracIdx = _computeFracIdx(btns, x, innerRect);
    _setScrubPosition(fracIdx);
    const snapped = Math.round(fracIdx);
    const btn = btns[snapped];
    if (btn && btn !== _tabDrag.lastBtn) {
      _tabDrag.lastBtn = btn;
      if (_tabOnSelect) _tabOnSelect(snapped);
    }
  }, { passive: true });

  inner.addEventListener('touchend', e => {
    if (!_tabDrag) return;
    document.querySelectorAll('#tab-bar-inner .tab-btn').forEach(b => b.classList.remove('drag-hover'));
    if (!_tabDrag.dragging) {
      const t = e.changedTouches[0];
      const btn = _getBtnAt(t.clientX, t.clientY) || _tabDrag.startBtn;
      const idx = _tabBtnIndex(btn);
      if (idx !== -1 && _tabOnSelect) _tabOnSelect(idx);
    } else {
      const snapped = Math.round(_pillIdx);
      setActiveTab(snapped, true);
    }
    _tabDrag = null;
  }, { passive: true });

  inner.addEventListener('mousedown', e => {
    const btn = _getBtnAt(e.clientX, e.clientY);
    if (!btn) return;
    _tabDrag = { startX: e.clientX, startBtn: btn, lastBtn: btn, dragging: false };
  });

  window.addEventListener('mousemove', e => {
    if (!_tabDrag) return;
    const dx = Math.abs(e.clientX - _tabDrag.startX);
    if (dx > 6) _tabDrag.dragging = true;
    if (!_tabDrag.dragging) return;
    const inner2 = document.getElementById('tab-bar-inner');
    const btns = Array.from(inner2.querySelectorAll('.tab-btn'));
    const innerRect = inner2.getBoundingClientRect();
    const x = e.clientX - innerRect.left + inner2.scrollLeft;
    const fracIdx = _computeFracIdx(btns, x, innerRect);
    _setScrubPosition(fracIdx);
    const snapped = Math.round(fracIdx);
    const btn = btns[snapped];
    if (btn && btn !== _tabDrag.lastBtn) {
      _tabDrag.lastBtn = btn;
      if (_tabOnSelect) _tabOnSelect(snapped);
    }
  });

  window.addEventListener('mouseup', e => {
    if (!_tabDrag) return;
    document.querySelectorAll('#tab-bar-inner .tab-btn').forEach(b => b.classList.remove('drag-hover'));
    if (!_tabDrag.dragging) {
      const btn = _getBtnAt(e.clientX, e.clientY) || _tabDrag.startBtn;
      const idx = _tabBtnIndex(btn);
      if (idx !== -1 && _tabOnSelect) _tabOnSelect(idx);
    } else {
      const snapped = Math.round(_pillIdx);
      setActiveTab(snapped, true);
    }
    _tabDrag = null;
  });
})();

// Compute fractional index accounting for scroll offset inside tab bar
function _computeFracIdx(btns, xRelativeToInnerWithScroll, innerRect) {
  // xRelativeToInnerWithScroll = clientX - innerRect.left + inner.scrollLeft
  // But btn rects are in viewport coords; we need to convert consistently
  // Use scrollLeft-adjusted positions:
  const inner = document.getElementById('tab-bar-inner');
  let fracIdx = 0;
  for (let i = 0; i < btns.length; i++) {
    const r = btns[i].getBoundingClientRect();
    const btnLeft = r.left - innerRect.left + inner.scrollLeft;
    const center = btnLeft + r.width / 2;
    if (i === 0 && xRelativeToInnerWithScroll <= center) { fracIdx = 0; break; }
    if (i === btns.length - 1 && xRelativeToInnerWithScroll >= center) { fracIdx = btns.length - 1; break; }
    if (i < btns.length - 1) {
      const nextR = btns[i+1].getBoundingClientRect();
      const nextLeft = nextR.left - innerRect.left + inner.scrollLeft;
      const nextCenter = nextLeft + nextR.width / 2;
      if (xRelativeToInnerWithScroll >= center && xRelativeToInnerWithScroll <= nextCenter) {
        fracIdx = i + (xRelativeToInnerWithScroll - center) / (nextCenter - center);
        break;
      }
    }
  }
  return fracIdx;
}

function renderDayTabs() {

    const clamped = Math.max(0, Math.min(frac, totalCards - 1));
    _setScrubPosition(clamped);
  }, { passive: true });

  _tabOnSelect = (idx) => {
    const cards = scroll.children;

function renderExTabs(exercises) {

  _tabOnSelect = (idx) => {

// ── Sliding pill ─────────────────────────────────────────────────────────────
const TAB_COLORS = {
  't-push': [10,  132, 255, 0.30],
  't-pull': [48,  209,  88, 0.26],
  't-legs': [255, 159,  10, 0.28],
  't-rest': [255, 255, 255, 0.09],
  'default':[255, 255, 255, 0.11],
};

function _getTabColor(btn) {
  for (const [cls, rgba] of Object.entries(TAB_COLORS)) {
    if (btn.classList.contains(cls)) return rgba;
  }
  return TAB_COLORS.default;
}

function _lerpColor(a, b, t) {
  return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t, a[3]+(b[3]-a[3])*t];
}

function _toRgba([r,g,b,a]) {
  return `rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${a.toFixed(3)})`;
}

function _ensurePill() {
  const inner = document.getElementById('tab-bar-inner');
  let pill = document.getElementById('tab-pill');
  if (!pill) {
    pill = document.createElement('div');
    pill.id = 'tab-pill';
    inner.insertBefore(pill, inner.firstChild);
  }
  return pill;
}

function _updatePill(fractionalIdx, animate = true) {
  const inner = document.getElementById('tab-bar-inner');
  const pill  = _ensurePill();
  const btns  = Array.from(inner.querySelectorAll('.tab-btn'));
  if (!btns.length) return;

  const clampedIdx = Math.max(0, Math.min(fractionalIdx, btns.length - 1));
  const loIdx = Math.floor(clampedIdx);
  const hiIdx = Math.min(loIdx + 1, btns.length - 1);
  const t     = clampedIdx - loIdx;

  const loBtn = btns[loIdx];
  const hiBtn = btns[hiIdx];

  // Use scroll-adjusted positions for accurate pill placement
  const innerRect = inner.getBoundingClientRect();
  const loRect    = loBtn.getBoundingClientRect();
  const hiRect    = hiBtn.getBoundingClientRect();

  const loLeft = loRect.left - innerRect.left + inner.scrollLeft;
  const hiLeft = hiRect.left - innerRect.left + inner.scrollLeft;

  const left  = loLeft + (hiLeft - loLeft) * t;
  const width = loRect.width + (hiRect.width - loRect.width) * t;

  const loColor = _getTabColor(loBtn);
  const hiColor = _getTabColor(hiBtn);
  const color   = _lerpColor(loColor, hiColor, t);

  if (animate) {
    pill.style.transition = 'left 0.28s cubic-bezier(0.34,1.1,0.64,1), width 0.28s cubic-bezier(0.34,1.1,0.64,1), background-color 0.28s ease';
  } else {
    pill.style.transition = 'none';
  }

  pill.style.left            = left + 'px';
  pill.style.width           = width + 'px';
  pill.style.backgroundColor = _toRgba(color);
}

let _pillIdx = 0;

function setActiveTab(idx, animate = true) {
  _pillIdx = idx;
  const btns = document.querySelectorAll('#tab-bar-inner .tab-btn');
  btns.forEach((b, i) => {
    b.classList.toggle('active', i === idx);
    b.style.color = i === idx ? '#fff' : '';
  });
  _updatePill(idx, animate);

  // Auto-scroll tab bar to keep active tab visible
  const inner = document.getElementById('tab-bar-inner');
  const pill = document.getElementById('tab-pill');
  if (pill && inner) {
    const pillLeft = parseFloat(pill.style.left) || 0;
    const pillWidth = parseFloat(pill.style.width) || 0;
    const pillCenter = pillLeft + pillWidth / 2;
    const innerWidth = inner.offsetWidth;
    // scroll to center the pill in view
    const targetScroll = pillCenter - innerWidth / 2;
    inner.scrollTo({ left: Math.max(0, targetScroll), behavior: animate ? 'smooth' : 'instant' });
  }
}

function _setScrubPosition(fractionalIdx) {
  _pillIdx = fractionalIdx;
  const btns = Array.from(document.querySelectorAll('#tab-bar-inner .tab-btn'));
  const rounded = Math.round(fractionalIdx);
  btns.forEach((b, i) => {
    const isActive = i === rounded;
    b.classList.toggle('active', isActive);
    b.style.color = isActive ? '#fff' : '';
  });
  _updatePill(fractionalIdx, false);

  // Auto-scroll tab bar
  const inner = document.getElementById('tab-bar-inner');
  const pill = document.getElementById('tab-pill');
  if (pill && inner) {
    const pillLeft = parseFloat(pill.style.left) || 0;
    const pillWidth = parseFloat(pill.style.width) || 0;
    const pillCenter = pillLeft + pillWidth / 2;
    const innerWidth = inner.offsetWidth;
    const targetScroll = pillCenter - innerWidth / 2;
    inner.scrollLeft = Math.max(0, targetScroll);
  }
}

function transitionViews(outEl, inEl, direction) {
  const fromClass = direction === 'forward' ? 'slide-from-right' : 'slide-from-left';
  inEl.classList.remove('active', 'slide-from-right', 'slide-from-left');
  inEl.classList.add(fromClass);
  inEl.offsetHeight;
  outEl.classList.remove('active');
  inEl.classList.add('active');
  inEl.addEventListener('transitionend', () => {
    inEl.classList.remove('slide-from-right', 'slide-from-left');
  }, { once: true });
}

function animateHeader(newTitle, showBack) {
  const titleEl = document.getElementById('header-title');
  const backEl  = document.getElementById('header-back');
  titleEl.style.transition = 'opacity 0.18s ease, transform 0.18s ease';
  titleEl.style.opacity = '0';
  titleEl.style.transform = 'translateY(-6px)';
  setTimeout(() => {
    titleEl.textContent = newTitle;
    titleEl.style.opacity = '1';
    titleEl.style.transform = 'translateY(0)';
    if (showBack) backEl.classList.add('visible');
    else backEl.classList.remove('visible');
  }, 160);
}

function selectDay(day) {
  if (ROUTINES[day].exercises.length === 0) { alert('Rest day — no exercises!'); return; }
  currentDay = day;
  const routine = ROUTINES[day];
  renderExerciseCards(day);
  renderExTabs(routine.exercises);
  animateHeader(routine.label, true);
  transitionViews(
    document.getElementById('view-days'),
    document.getElementById('view-exercises'),
    'forward'
  );
}

function backToDays() {
  currentDay = null;
  renderDayTabs();
  animateHeader('My Fitness Plan', false);
  transitionViews(
    document.getElementById('view-exercises'),
    document.getElementById('view-days'),
    'back'
  );
}

function renderExerciseCards(day) {
  const routine = ROUTINES[day];
  const today = new Date().toISOString().split('T')[0];
  const logData = getLogEntries();
  const container = document.getElementById('ex-scroll');
  container.innerHTML = '';

  routine.exercises.forEach((ex, idx) => {
    const cardId = `ex-card-${idx}`;
    const entries = logData[ex.name] || [];
    const shown = entries.slice(-3).reverse();

    let prevHtml = '';
    if (shown.length > 0) {
      const safeName = ex.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      prevHtml = `<div class="prev-section"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h4 style="margin-bottom:0">Previous</h4><button style="background:none;border:none;color:var(--red);font-size:13px;font-weight:600;cursor:pointer;padding:4px 0" onclick="clearEntries('${safeName}','${cardId}')">Clear All</button></div>`;
      shown.forEach((entry, i) => {
        const d = new Date(entry.date + 'T12:00:00');
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const setsStr = entry.sets.map(s => `${s.reps}×${s.weight}lb`).join('  ');
        let prog = '';
        if (i < shown.length - 1) {
          const curr = bestSet(entry.sets), prev = bestSet(shown[i+1].sets);
          if (curr && prev) {
            const wD = curr.w - prev.w, rD = curr.r - prev.r;
            if (wD > 0) prog = `<div class="prev-entry-progress up">▲ +${wD} lbs</div>`;
            else if (wD < 0) prog = `<div class="prev-entry-progress down">▼ ${wD} lbs</div>`;
            else if (rD > 0) prog = `<div class="prev-entry-progress up">▲ +${rD} reps</div>`;
            else if (rD < 0) prog = `<div class="prev-entry-progress down">▼ ${rD} reps</div>`;
            else prog = `<div class="prev-entry-progress same">Same</div>`;
          }
        } else {
          prog = `<div class="prev-entry-progress same">First</div>`;
        }
        prevHtml += `<div class="prev-entry"><div><div class="prev-entry-date">${dateStr}</div><div class="prev-entry-sets">${setsStr}</div></div>${prog}</div>`;
      });
      prevHtml += '</div>';
    }

    const badgeLabel = ex.shoulder ? 'Shoulders' : (ex.type.charAt(0).toUpperCase() + ex.type.slice(1));
    const badgeClass = ex.shoulder ? 'shoulder' : ex.type;

    const card = document.createElement('div');
    card.className = `ex-card ${ex.type}`;
    card.id = cardId;
    card.innerHTML = `
      <div class="ex-card-header">
        <div class="ex-card-name">${ex.name}</div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <span class="ex-card-badge ${badgeClass}">${badgeLabel}</span>
          <button style="background:rgba(255,255,255,0.07);color:var(--text2);border:0.5px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:500;font-family:inherit;transition:opacity 0.15s" onclick="openReplaceModal('${ex.name.replace(/'/g,"\\'")}', ${idx})">Replace</button>
        </div>
      </div>
      <div class="ex-card-body">
        <div class="ex-date-row">
          <span class="ex-date-label">Date</span>
          <input type="date" class="ex-date-input" value="${today}">
        </div>
        <div class="set-table">
          <div class="set-table-head"><div>Set</div><div>Reps</div><div>Weight (lbs)</div></div>
          <div class="set-table-rows"></div>
        </div>
        <button class="add-set-btn" onclick="addSetToCard('${cardId}')">+ Add Set</button>
        ${prevHtml}
        <button class="ex-save-btn" onclick="saveCardEntry('${cardId}', '${ex.name.replace(/'/g,"\\'")}')">Save Entry</button>
      </div>
    `;
    container.appendChild(card);
    for (let i = 0; i < 3; i++) addSetToCard(cardId);
  });
}

function addSetToCard(cardId) {
  const card = document.getElementById(cardId);
  const rows = card.querySelector('.set-table-rows');
  const n = rows.querySelectorAll('.set-table-row').length + 1;
  const row = document.createElement('div');
  row.className = 'set-table-row';
  row.innerHTML = `<div class="set-table-num">${n}</div><input type="number" placeholder="—" min="1" max="100" class="set-reps"><input type="number" placeholder="—" min="0" step="2.5" class="set-weight">`;
  rows.appendChild(row);
}

function saveCardEntry(cardId, exerciseName) {
  const card = document.getElementById(cardId);
  const date = card.querySelector('.ex-date-input').value;
  if (!date) { alert('Pick a date.'); return; }
  const setRows = card.querySelectorAll('.set-table-row');
  const sets = [];
  setRows.forEach(row => {
    const reps = row.querySelector('.set-reps').value;
    const weight = row.querySelector('.set-weight').value;
    if (reps || weight) sets.push({ reps: reps || '—', weight: weight || '—' });
  });
  if (sets.length === 0) { alert('Add at least one set.'); return; }
  const data = getLogEntries();
  if (!data[exerciseName]) data[exerciseName] = [];
  data[exerciseName] = data[exerciseName].filter(e => e.date !== date);
  data[exerciseName].push({ date, sets });
  data[exerciseName].sort((a, b) => a.date.localeCompare(b.date));
  saveLogEntries(data);
  const btn = card.querySelector('.ex-save-btn');
  btn.textContent = '✓ Saved!';
  btn.style.background = 'var(--green)';
  setTimeout(() => { btn.textContent = 'Save Entry'; btn.style.background = ''; }, 1500);
  renderExerciseCards(currentDay);
  setTimeout(() => {
    const allIds = Array.from(document.getElementById('ex-scroll').children).map(c => c.id);
    const i = allIds.indexOf(cardId);
    const cards = document.querySelectorAll('.ex-card');
    if (cards[i]) cards[i].scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
  }, 50);
}

function clearEntries(exerciseName, cardId) {
  const data = getLogEntries();
  delete data[exerciseName];
  saveLogEntries(data);
  renderExerciseCards(currentDay);
  setTimeout(() => {
    const cards = Array.from(document.getElementById('ex-scroll').children);
    const i = cards.findIndex(c => c.id === cardId);
    if (cards[i]) cards[i].scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
  }, 50);
}

function bestSet(sets) {
  if (!sets || sets.length === 0) return null;
  let best = null;
  sets.forEach(s => {
    const w = parseFloat(s.weight) || 0, r = parseFloat(s.reps) || 0;
    if (!best || w > best.w || (w === best.w && r > best.r)) best = { w, r };
  });
  return best;
}

function openReplaceModal(exerciseName, cardIdx) {
  replaceExerciseName = exerciseName;
  replaceCardIndex = cardIdx;
  document.getElementById('replace-exercise-name').textContent = `Currently: ${exerciseName}`;
  const select = document.getElementById('replace-exercise-select');
  select.innerHTML = '<option value="">Select a new exercise...</option>' +
    ALL_EXERCISES.filter(ex => ex.name !== exerciseName)
      .map(ex => `<option value="${ex.name}">${ex.name}</option>`).join('');
  document.getElementById('replace-modal').classList.remove('hidden');
}

function confirmReplaceExercise() {
  const val = document.getElementById('replace-exercise-select').value;
  if (!val) { alert('Select an exercise.'); return; }
  const newEx = ALL_EXERCISES.find(ex => ex.name === val);
  ROUTINES[currentDay].exercises[replaceCardIndex] = { ...newEx };
  closeReplaceModal();
  renderExerciseCards(currentDay);
  renderExTabs(ROUTINES[currentDay].exercises);
}

function closeReplaceModal() {
  document.getElementById('replace-modal').classList.add('hidden');
  replaceExerciseName = null; replaceCardIndex = null;
}

function closeReplaceModalOutside(e) {
  if (e.target === document.getElementById('replace-modal')) closeReplaceModal();
}

function updateHeaderDate() {
  const today = new Date();
  const dayName = today.toLocaleDateString('en-US', { weekday: 'short' });
  const date = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  document.getElementById('header-sub').textContent = `${dayName} · ${date}`;
}
updateHeaderDate();
renderDayTabs();
</script>
