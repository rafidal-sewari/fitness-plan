<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Plan">
<meta name="theme-color" content="#0f0f0f">
<title>My Fitness Plan</title>
<style>
  :root {
    --bg:          #000000;
    --bg2:         #1c1c1e;
    --bg3:         #2c2c2e;
    --bg4:         #3a3a3c;
    --border:      rgba(255,255,255,0.08);
    --border2:     rgba(255,255,255,0.12);
    --text:        #ffffff;
    --text2:       rgba(255,255,255,0.55);
    --text3:       rgba(255,255,255,0.3);
    --blue:        #0a84ff;
    --blue-bg:     rgba(10,132,255,0.14);
    --blue-border: rgba(10,132,255,0.28);
    --green:       #30d158;
    --green-bg:    rgba(48,209,88,0.14);
    --green-border:rgba(48,209,88,0.28);
    --amber:       #ff9f0a;
    --amber-bg:    rgba(255,159,10,0.14);
    --amber-border:rgba(255,159,10,0.28);
    --red:         #ff453a;
    --red-bg:      rgba(255,69,58,0.12);
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);

    /* flat defaults */
    --radius-card: 22px;
    --radius-btn:  14px;
    --radius-input:12px;
    --glass-tint:        rgba(255,255,255,0.09);
    --glass-tint-strong: rgba(255,255,255,0.16);
    --glass-edge-top:    rgba(255,255,255,0.38);
    --glass-edge-bottom: rgba(255,255,255,0.08);
    --glass-shadow-out:  0 20px 60px rgba(0,0,0,0.55), 0 4px 16px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.06);
    --glass-shadow-in:   inset 0 1px 1px rgba(255,255,255,0.28), inset 0 -1px 2px rgba(0,0,0,0.20), inset 0 0 0 0.5px rgba(255,255,255,0.06);
    --glass-blur:        blur(16px) saturate(260%) brightness(1.12) contrast(1.04);
    --glass-chroma-r:    rgba(255,60,80,0.13);
    --glass-chroma-b:    rgba(40,100,255,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  /* When exercises view is active, body bg stays black underneath the frozen+blurred day view */
  body.exercises-active {
    background: #000;
  }


  /* ── APP SHELL ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; position: relative; z-index: 1; background: transparent; }

  /* ── SETTINGS BUTTON ── */
  #settings-btn-wrap {
    position: fixed;
    top: calc(14px + var(--safe-top));
    right: 16px;
    z-index: 200;
  }
  #settings-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.12);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 2px 8px rgba(0,0,0,0.3);
    transition: background 0.35s ease, opacity 0.15s;
  }
  #settings-btn:active { opacity: 0.7; }
  #settings-btn svg { width: 18px; height: 18px; stroke: var(--text2); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  body.theme-glass #settings-btn {
    background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05));
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 2px 10px rgba(0,0,0,0.3);
  }

  /* ── THEME ROW (inline switch, used inside Settings modal) ── */
  .theme-row-switch { display: flex; align-items: center; gap: 8px; }
  #theme-toggle-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    pointer-events: none;
    transition: color 0.3s;
    white-space: nowrap;
  }
  #theme-toggle {
    width: 44px;
    height: 26px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    position: relative;
    transition: background 0.35s ease;
    background: rgba(255,255,255,0.12);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 2px 8px rgba(0,0,0,0.3);
    flex-shrink: 0;
  }
  #theme-toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }
  body.theme-glass #theme-toggle {
    background: var(--blue);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 2px 10px rgba(10,132,255,0.4);
  }
  body.theme-glass #theme-toggle::after {
    transform: translateX(18px);
  }
  body.theme-glass #theme-toggle-label {
    color: var(--text2);
  }

  /* ── Split toggle button ── */
  #split-toggle {
    width: 44px;
    height: 26px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    position: relative;
    transition: background 0.35s ease;
    background: rgba(255,255,255,0.12);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 2px 8px rgba(0,0,0,0.3);
    flex-shrink: 0;
  }
  #split-toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }
  body.split-ul #split-toggle {
    background: var(--blue);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 2px 10px rgba(10,132,255,0.4);
  }
  body.split-ul #split-toggle::after {
    transform: translateX(18px);
  }
  body.theme-glass #split-toggle {
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 2px 10px rgba(0,0,0,0.3);
  }

  /* ── HEADER ── */
  #header {
    padding: 12px 20px 14px;
    padding-top: calc(12px + var(--safe-top));
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative; z-index: 5;
    /* flat */
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom: 0.5px solid var(--border2);
    box-shadow: none;
    transition: background 0.35s, box-shadow 0.35s, border-color 0.35s;
  }
  body.theme-glass #header {
    background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.04) 60%, rgba(0,0,0,0.1) 100%), rgba(18,18,22,0.38);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-bottom: 0.5px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 1px 0 var(--glass-edge-top), inset 0 -0.5px 0 rgba(255,255,255,0.04), 0 2px 24px rgba(0,0,0,0.3);
  }
  #header-back {
    display: none;
    align-items: center;
    gap: 3px;
    color: var(--blue);
    font-size: 17px;
    font-weight: 400;
    cursor: pointer;
    flex-shrink: 0;
    padding: 4px 0;
  }
  #header-back svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  #header-back.visible { display: flex; }
  #header-titles { flex: 1; }
  #header-titles h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; line-height: 1.2; }
  #header-titles p  { font-size: 12px; color: var(--text2); margin-top: 1px; font-weight: 400; letter-spacing: 0.01em; }

  /* ── CONTENT + VIEWS ── */
  #content { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; }
  .view {
    display: flex; flex: 1; flex-direction: column;
    position: absolute; inset: 0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.4,0,0.2,1);
    will-change: transform, opacity;
  }
  .view.active { opacity: 1; pointer-events: auto; transform: translateX(0) !important; }
  .view.slide-from-right { transform: translateX(5%); }
  .view.slide-from-left  { transform: translateX(-5%); }
  /* Freeze the day cards as a blurred backdrop when exercises are shown */
  #view-days.frozen {
    opacity: 1 !important;
    pointer-events: none !important;
    filter: blur(18px) brightness(0.55) saturate(1.4);
    transform: scale(1.06) !important;
    transition: filter 0.3s ease, transform 0.3s ease, opacity 0.3s ease !important;
  }

  /* ── TAB BAR ── */
  #tab-bar {
    flex-shrink: 0;
    padding: 10px 16px calc(16px + var(--safe-bottom));
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    background: transparent;
    overflow: visible;
  }
  #tab-bar::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to top, #000 55%, transparent);
    pointer-events: none;
    transition: background 0.35s;
  }
  body.theme-glass #tab-bar::before {
    background: linear-gradient(to top, rgba(4,4,6,0.45) 30%, transparent);
  }
  #tab-bar-inner {
    position: relative; z-index: 1;
    display: flex; align-items: center;
    border-radius: 100px;
    padding: 4px;
    gap: 2px;
    max-width: calc(100vw - 32px - 62px - 16px);
    flex-wrap: nowrap;
    user-select: none;
    overflow-x: auto;
    overflow-y: visible;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    touch-action: pan-x;
    /* flat */
    background: rgba(28,28,30,0.9);
    backdrop-filter: blur(28px) saturate(200%);
    -webkit-backdrop-filter: blur(28px) saturate(200%);
    border: 0.5px solid rgba(255,255,255,0.12);
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 32px rgba(0,0,0,0.5);
    transition: background 0.35s, box-shadow 0.35s, border-color 0.35s,
                width  0.46s cubic-bezier(0.4,0,0.2,1),
                height 0.46s cubic-bezier(0.4,0,0.2,1),
                border-radius 0.46s cubic-bezier(0.4,0,0.2,1),
                min-width 0.46s cubic-bezier(0.4,0,0.2,1);
    /* height is normally 'auto' — we lock it via JS before animating */
  }
  body.theme-glass #tab-bar-inner {
    background: linear-gradient(180deg, rgba(255,255,255,0.20) 0%, rgba(255,255,255,0.06) 40%, rgba(0,0,0,0.08) 100%), rgba(28,28,34,0.42);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 0.5px solid rgba(255,255,255,0.20);
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.28),
      inset 0 -1.5px 3px rgba(0,0,0,0.30),
      inset 1px 0 0 rgba(255,60,80,0.08),
      inset -1px 0 0 rgba(40,100,255,0.08),
      0 18px 48px rgba(0,0,0,0.55),
      0 4px 14px rgba(0,0,0,0.38);
  }
  #tab-bar-inner::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    width: 56px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 7px 8px;
    gap: 2px;
    border: none; background: none;
    color: rgba(255,255,255,0.35);
    cursor: pointer;
    border-radius: 100px;
    min-height: 42px;
    transition: color 0.22s ease, background 0.22s ease;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    position: relative; z-index: 1;
  }
  .tab-label { font-size: 12px; font-weight: 600; letter-spacing: -0.15px; }
  .tab-sub   { font-size: 9px; font-weight: 500; opacity: 0.65; }
  .tab-btn.active { color: #fff; }
  .tab-btn.drag-hover { color: rgba(255,255,255,0.65); }

  /* Sliding pill */
  #tab-pill {
    position: absolute;
    top: 4px;
    height: calc(100% - 8px);
    border-radius: 100px;
    pointer-events: none;
    z-index: 0;
    will-change: left, width, background-color;
    transition: box-shadow 0.35s, border 0.35s;
  }
  body.theme-glass #tab-pill {
    box-shadow:
      inset 0 1px 0.5px rgba(255,255,255,0.26),
      inset 0 -1px 2px rgba(0,0,0,0.22),
      inset 1px 0 0 rgba(255,60,80,0.10),
      inset -1px 0 0 rgba(40,100,255,0.10),
      0 3px 12px rgba(0,0,0,0.30);
    border: 0.5px solid rgba(255,255,255,0.25);
  }

  /* ── DAY CARDS ── */
  #view-days { padding: 16px 0 16px; }
  .day-scroll {
    display: flex; gap: 12px;
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    flex: 1; align-items: stretch;
    padding: 0 16px;
  }
  .day-scroll::-webkit-scrollbar { display: none; }
  .day-card {
    border-radius: var(--radius-card);
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.12s ease, background 0.35s, border-color 0.35s, box-shadow 0.35s;
    flex-shrink: 0; width: 80vw;
    scroll-snap-align: center;
    user-select: none;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 28px 20px;
    position: relative;
    overflow: hidden;
    /* flat */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 0.5px solid var(--border2);
    box-shadow: none;
  }
  body.theme-glass .day-card {
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 0.5px solid rgba(255,255,255,0.18);
    box-shadow: var(--glass-shadow-in), var(--glass-shadow-out);
  }
  .day-card::before {
    content: '';
    position: absolute; inset: 0;
    background: 
      linear-gradient(125deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.03) 28%, rgba(255,255,255,0) 50%),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 0%, rgba(0,0,0,0.04) 100%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s;
    border-radius: inherit;
  }
  body.theme-glass .day-card::before { opacity: 1; }
  /* chromatic aberration rim on day cards */
  body.theme-glass .day-card::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background: transparent;
    box-shadow:
      inset 1.5px 0 0 rgba(255,50,70,0.12),
      inset -1.5px 0 0 rgba(30,80,255,0.12),
      inset 0 1px 0 rgba(255,255,255,0.24),
      inset 0 -1px 0 rgba(255,255,255,0.08);
  }
  .day-card:active { transform: scale(0.97); opacity: 0.85; }
  .day-card .wd-name,
  .day-card .wd-type,
  .day-card .wd-sub { position: relative; z-index: 1; }
  .day-card .wd-name { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .day-card .wd-type { font-size: 34px; font-weight: 700; line-height: 1.1; letter-spacing: -0.5px; }
  .day-card .wd-sub  { font-size: 14px; color: var(--text2); margin-top: 10px; font-weight: 400; }
  .day-card.push { background: linear-gradient(145deg, rgba(10,132,255,0.18) 0%, rgba(10,132,255,0.06) 100%); border-color: rgba(10,132,255,0.2); }
  .day-card.push .wd-type { color: var(--blue); }
  .day-card.pull { background: linear-gradient(145deg, rgba(48,209,88,0.16) 0%, rgba(48,209,88,0.05) 100%); border-color: rgba(48,209,88,0.2); }
  .day-card.pull .wd-type { color: var(--green); }
  .day-card.legs { background: linear-gradient(145deg, rgba(255,159,10,0.16) 0%, rgba(255,159,10,0.05) 100%); border-color: rgba(255,159,10,0.2); }
  .day-card.legs .wd-type { color: var(--amber); }
  .day-card.upper { background: linear-gradient(145deg, rgba(10,132,255,0.18) 0%, rgba(10,132,255,0.06) 100%); border-color: rgba(10,132,255,0.2); }
  .day-card.upper .wd-type { color: var(--blue); }
  .day-card.lower { background: linear-gradient(145deg, rgba(255,159,10,0.16) 0%, rgba(255,159,10,0.05) 100%); border-color: rgba(255,159,10,0.2); }
  .day-card.lower .wd-type { color: var(--amber); }
  /* flat rest */
  body:not(.theme-glass) .day-card.rest { background: var(--bg2); border-color: var(--border); }
  body:not(.theme-glass) .day-card.rest .wd-type { color: var(--text3); }
  /* glass rest */
  body.theme-glass .day-card.rest { background: linear-gradient(145deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 100%); border-color: rgba(255,255,255,0.12); }
  body.theme-glass .day-card.rest .wd-type { color: var(--text3); }

  /* ── EXERCISE CARDS ── */
  #view-exercises { padding: 16px 0; overflow: hidden; }
  .ex-scroll {
    display: flex; gap: 12px;
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    flex: 1; align-items: stretch;
    padding: 0 16px;
  }
  .ex-scroll::-webkit-scrollbar { display: none; }
  .ex-card {
    border-radius: var(--radius-card);
    flex-shrink: 0; width: 88vw;
    scroll-snap-align: center;
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: background 0.35s, border-color 0.35s, box-shadow 0.35s;
    max-height: 100%;
    min-height: 0;
    /* flat — translucent like the nutrition panel */
    border: 0.5px solid rgba(255,255,255,0.10);
    background: rgba(28,28,30,0.72);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }
  body.theme-glass .ex-card {
    border: 0.5px solid rgba(255,255,255,0.20);
    background: linear-gradient(165deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 45%, rgba(0,0,0,0.04) 100%);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    box-shadow: var(--glass-shadow-in), var(--glass-shadow-out),
      inset 1.5px 0 0 rgba(255,50,70,0.10),
      inset -1.5px 0 0 rgba(30,80,255,0.10);
  }
  .ex-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(125deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.02) 28%, rgba(255,255,255,0) 50%);
    pointer-events: none; z-index: 0;
    opacity: 0;
    transition: opacity 0.35s;
  }
  body.theme-glass .ex-card::before { opacity: 1; }
  .ex-card.push { border-color: rgba(10,132,255,0.2); }
  .ex-card.pull { border-color: rgba(48,209,88,0.18); }
  .ex-card.legs { border-color: rgba(255,159,10,0.18); }
  .ex-card.upper { border-color: rgba(10,132,255,0.2); }
  .ex-card.lower { border-color: rgba(255,159,10,0.18); }
  body.theme-glass .ex-card.push { border-color: rgba(10,132,255,0.28); }
  body.theme-glass .ex-card.pull { border-color: rgba(48,209,88,0.24); }
  body.theme-glass .ex-card.legs { border-color: rgba(255,159,10,0.24); }
  body.theme-glass .ex-card.upper { border-color: rgba(10,132,255,0.28); }
  body.theme-glass .ex-card.lower { border-color: rgba(255,159,10,0.24); }

  /* ── ADD EXERCISE CARD (end of exercise carousel) ── */
  .add-ex-card {
    border-radius: var(--radius-card);
    flex-shrink: 0; width: 88vw;
    scroll-snap-align: center;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px;
    cursor: pointer;
    border: 1.5px dashed var(--border2);
    background: rgba(255,255,255,0.025);
    transition: opacity 0.15s, background 0.35s, border-color 0.35s;
  }
  .add-ex-card:active { opacity: 0.7; }
  .add-ex-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.08);
  }
  .add-ex-icon svg { width: 26px; height: 26px; stroke: var(--text2); fill: none; stroke-width: 2.4; stroke-linecap: round; }
  .add-ex-label { font-size: 15px; font-weight: 600; color: var(--text2); }
  body.theme-glass .add-ex-card {
    background: linear-gradient(165deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.01) 100%);
    border-color: rgba(255,255,255,0.2);
  }

  .ex-card-header {
    padding: 18px 18px 14px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    border-bottom: 0.5px solid var(--border2);
    position: relative; z-index: 1;
  }
  .ex-card-name { font-size: 19px; font-weight: 600; line-height: 1.2; flex: 0 1 auto; min-width: 0; letter-spacing: -0.3px; }
  .ex-card-badge {
    font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 20px; flex-shrink: 0; margin-top: 0; align-self: center; letter-spacing: 0.01em;
  }
  body.theme-glass .ex-card-badge {
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .ex-card-badge.push     { background: var(--blue-bg);  color: var(--blue);  border: 0.5px solid var(--blue-border); }
  .ex-card-badge.pull     { background: var(--green-bg); color: var(--green); border: 0.5px solid var(--green-border); }
  .ex-card-badge.legs     { background: var(--amber-bg); color: var(--amber); border: 0.5px solid var(--amber-border); }
  .ex-card-badge.shoulder { background: var(--amber-bg); color: var(--amber); border: 0.5px solid var(--amber-border); }
  .ex-card-badge.upper    { background: var(--blue-bg);  color: var(--blue);  border: 0.5px solid var(--blue-border); }
  .ex-card-badge.lower    { background: var(--amber-bg); color: var(--amber); border: 0.5px solid var(--amber-border); }

  .ex-card-body { flex: 1; overflow-y: auto; padding: 16px 18px 16px; display: flex; flex-direction: column; gap: 14px; position: relative; z-index: 1; min-height: 0; }
  .ex-card-footer {
    flex-shrink: 0;
    background: rgba(28,28,30,0.60);
    border-top: 0.5px solid rgba(255,255,255,0.10);
    position: relative; z-index: 1;
    transition: background 0.35s, border-color 0.35s;
  }
  body.theme-glass .ex-card-footer {
    background: rgba(255,255,255,0.04);
    border-top-color: rgba(255,255,255,0.10);
  }
  .ex-card-footer-empty { display: none; }
  .ex-card-body::-webkit-scrollbar { display: none; }

  .ex-date-row { display: flex; align-items: center; gap: 10px; }
  .ex-date-label { font-size: 12px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
  .ex-date-input {
    border-radius: var(--radius-input);
    color: var(--text); font-size: 15px; padding: 9px 13px;
    appearance: none; -webkit-appearance: none; flex: 1;
    font-family: inherit;
    /* flat */
    background: var(--bg3); border: 0.5px solid var(--border2);
    transition: background 0.35s, border-color 0.35s;
  }
  body.theme-glass .ex-date-input {
    background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.14);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
  }

  /* ── STEPPER SET ROWS ── */
  .set-table { display: flex; flex-direction: column; gap: 8px; }
  .set-row {
    display: flex; align-items: center; gap: 8px;
    background: rgba(44,44,46,0.65); border-radius: 16px;
    border: 0.5px solid rgba(255,255,255,0.10);
    padding: 10px 10px 10px 14px;
    transition: background 0.35s, border-color 0.35s;
  }
  body.theme-glass .set-row {
    background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.04) 100%);
    border-color: rgba(255,255,255,0.16);
    backdrop-filter: blur(12px) saturate(200%); -webkit-backdrop-filter: blur(12px) saturate(200%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), inset 0 -1px 0 rgba(0,0,0,0.12),
      inset 1px 0 0 rgba(255,50,70,0.07), inset -1px 0 0 rgba(30,80,255,0.07);
  }
  .set-row-num {
    font-size: 12px; font-weight: 700; color: var(--text3);
    width: 18px; flex-shrink: 0; text-align: center;
  }
  .set-stepper-group { display: flex; align-items: center; gap: 6px; flex: 1; }
  .set-stepper-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .set-stepper-label { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .set-stepper { display: flex; align-items: center; gap: 0; width: 100%; }
  .stepper-btn {
    width: 38px; height: 38px; flex-shrink: 0;
    border: none; border-radius: 50%;
    background: rgba(255,255,255,0.09);
    color: var(--text); font-size: 20px; font-weight: 300; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .stepper-btn:active { opacity: 0.55; background: rgba(255,255,255,0.18); }
  body.theme-glass .stepper-btn { background: rgba(255,255,255,0.11); box-shadow: inset 0 1px 0 rgba(255,255,255,0.2); }
  .stepper-val {
    flex: 1; text-align: center;
    font-size: 22px; font-weight: 600; color: var(--text);
    letter-spacing: -0.5px; line-height: 1;
    cursor: text;
  }
  .stepper-val[contenteditable="true"]:focus { outline: none; color: var(--blue); }
  .set-divider { width: 0.5px; height: 32px; background: var(--border2); flex-shrink: 0; margin: 0 2px; }
  .set-row-del {
    width: 30px; height: 30px; flex-shrink: 0; margin-left: 2px;
    border: none; border-radius: 50%; background: none;
    color: var(--text3); font-size: 18px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .set-row-del:active { color: var(--red); opacity: 0.7; }
  .set-row-dupe {
    width: 30px; height: 30px; flex-shrink: 0; margin-left: 0;
    border: none; border-radius: 50%; background: none;
    color: var(--text3); font-size: 13px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .set-row-dupe:active { color: var(--blue); opacity: 0.7; }

  .add-set-btn {
    border-radius: var(--radius-btn);
    color: var(--blue); font-size: 15px; padding: 13px; width: 100%;
    cursor: pointer; font-weight: 600; min-height: 48px; font-family: inherit;
    transition: opacity 0.15s, background 0.35s, border 0.35s;
    /* flat */
    background: var(--bg3); border: none;
  }
  body.theme-glass .add-set-btn {
    background: rgba(10,132,255,0.14); border: 0.5px solid rgba(10,132,255,0.22);
    backdrop-filter: blur(16px) saturate(160%); -webkit-backdrop-filter: blur(16px) saturate(160%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .add-set-btn:active { opacity: 0.7; }

  .ex-save-btn {
    border-radius: var(--radius-btn);
    padding: 15px; font-size: 17px; font-weight: 600; cursor: pointer; width: 100%;
    min-height: 52px; transition: opacity 0.15s, background 0.35s, box-shadow 0.35s, border 0.35s; font-family: inherit; letter-spacing: -0.2px;
    /* flat */
    background: var(--blue); color: #fff; border: none;
  }
  body.theme-glass .ex-save-btn {
    background: linear-gradient(165deg, rgba(40,150,255,0.95), rgba(10,110,235,0.92));
    border: 0.5px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.4), inset 0 -1px 2px rgba(0,0,0,0.15), 0 6px 18px rgba(10,132,255,0.35);
  }
  .ex-save-btn:active { opacity: 0.75; }

    /* ── PREVIOUS ENTRIES FOOTER ── */
  .ex-card-footer {
    flex-shrink: 0;
    border-top: 0.5px solid var(--border2);
    position: relative; z-index: 1;
    transition: background 0.35s, border-color 0.35s;
    overflow: hidden;
  }
  .prev-section {
    padding: 4px 0 0;
    background: none;
    transition: background 0.35s;
  }
  body.theme-glass .prev-section {
    background: none;
  }
  .prev-section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .prev-section h4 { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin: 0; }
  .prev-entries-list { display: flex; flex-direction: column; }
  .prev-entry { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
  .prev-entry:last-child { border-bottom: none; }
  .prev-entry-date { font-size: 12px; color: var(--text3); font-weight: 500; }
  .prev-entry-sets { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .prev-entry-progress { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .prev-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 18px 0; gap: 6px;
  }
  .prev-empty-icon { font-size: 22px; opacity: 0.3; }
  .prev-empty-text { font-size: 12px; color: var(--text3); font-weight: 500; }
  .prev-entry-progress.up   { color: var(--green); background: var(--green-bg); }
  .prev-entry-progress.down { color: var(--red);   background: var(--red-bg); }
  .prev-entry-progress.same { color: var(--text3); background: rgba(255,255,255,0.06); }

  /* ── REPLACE MODAL ── */
  .replace-modal {
    position: fixed; inset: 0; z-index: 101;
    display: flex; align-items: flex-end;
    background: rgba(0,0,0,0);
    transition: background 0.3s ease;
  }
  .replace-modal:not(.hidden) { background: rgba(0,0,0,0.6); }
  .replace-modal.hidden { display: none; }
  .replace-modal-content {
    border-radius: 16px 16px 0 0;
    border-top: 0.5px solid rgba(255,255,255,0.14);
    padding: 12px 20px 24px;
    padding-bottom: calc(24px + var(--safe-bottom));
    width: 100%;
    /* flat */
    background: rgba(28,28,30,0.95);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    transition: background 0.35s;
  }
  body.theme-glass .replace-modal:not(.hidden) { backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
  body.theme-glass .replace-modal-content {
    background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.06) 40%, rgba(0,0,0,0.06) 100%), rgba(24,24,30,0.50);
    backdrop-filter: blur(32px) saturate(280%) brightness(1.14) contrast(1.05);
    -webkit-backdrop-filter: blur(32px) saturate(280%) brightness(1.14) contrast(1.05);
    border-radius: 28px 28px 0 0;
    border-top: 0.5px solid rgba(255,255,255,0.28);
    box-shadow: 
      inset 0 1px 1px rgba(255,255,255,0.26),
      inset 1.5px 0 0 rgba(255,50,70,0.09),
      inset -1.5px 0 0 rgba(30,80,255,0.09),
      0 -12px 50px rgba(0,0,0,0.45);
  }
  .replace-modal-content::before {
    content: ''; display: block; width: 36px; height: 5px;
    background: rgba(255,255,255,0.25); border-radius: 3px; margin: 0 auto 20px;
  }
  .replace-modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.2px; }
  .replace-modal p  { font-size: 14px; color: var(--text2); margin-bottom: 18px; font-weight: 400; }
  .replace-modal select {
    width: 100%; margin-bottom: 16px;
    border-radius: var(--radius-input); color: var(--text);
    font-size: 16px; padding: 13px 15px; appearance: none; -webkit-appearance: none;
    font-family: inherit;
    /* flat */
    background: var(--bg3); border: 0.5px solid var(--border2);
  }
  body.theme-glass .replace-modal select {
    background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.16);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.14);
  }
  .replace-modal-btns { display: flex; gap: 10px; }
  .replace-modal-btns button {
    flex: 1; padding: 15px; border-radius: var(--radius-btn);
    font-size: 16px; font-weight: 600; cursor: pointer;
    min-height: 52px; font-family: inherit; transition: opacity 0.15s;
  }
  .replace-modal-btns button:active { opacity: 0.75; }
  /* flat modal buttons */
  body:not(.theme-glass) .btn-cancel { background: var(--bg3); color: var(--text2); border: none; }
  body:not(.theme-glass) .btn-save   { background: var(--blue); color: #fff; border: none; }
  /* glass modal buttons */
  body.theme-glass .replace-modal-btns button { border: 0.5px solid rgba(255,255,255,0.16); backdrop-filter: blur(16px) saturate(160%); -webkit-backdrop-filter: blur(16px) saturate(160%); }
  body.theme-glass .btn-cancel { background: rgba(255,255,255,0.08); color: var(--text2); box-shadow: inset 0 1px 0 rgba(255,255,255,0.14); }
  body.theme-glass .btn-save   { background: linear-gradient(165deg, rgba(40,150,255,0.95), rgba(10,110,235,0.92)); color: #fff; box-shadow: inset 0 1px 1px rgba(255,255,255,0.4), 0 4px 14px rgba(10,132,255,0.35); }

  /* ── SETTINGS MODAL ── */
  .settings-modal {
    position: fixed; inset: 0; z-index: 102;
    display: flex; align-items: flex-end;
    background: rgba(0,0,0,0);
    transition: background 0.35s ease;
    pointer-events: none;
  }
  .settings-modal.open { background: rgba(0,0,0,0.6); pointer-events: auto; }
  .settings-modal-content {
    border-radius: 16px 16px 0 0;
    border-top: 0.5px solid rgba(255,255,255,0.14);
    padding: 12px 20px 24px;
    padding-bottom: calc(24px + var(--safe-bottom));
    width: 100%;
    max-height: 82vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32,0.72,0,1), background 0.35s;
    /* flat */
    background: rgba(28,28,30,0.95);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
  }
  .settings-modal.open .settings-modal-content { transform: translateY(0); }
  body.theme-glass .settings-modal.open { backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
  body.theme-glass .settings-modal-content {
    background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.06) 40%, rgba(0,0,0,0.06) 100%), rgba(24,24,30,0.50);
    backdrop-filter: blur(32px) saturate(280%) brightness(1.14) contrast(1.05);
    -webkit-backdrop-filter: blur(32px) saturate(280%) brightness(1.14) contrast(1.05);
    border-radius: 28px 28px 0 0;
    border-top: 0.5px solid rgba(255,255,255,0.28);
    box-shadow: 
      inset 0 1px 1px rgba(255,255,255,0.26),
      inset 1.5px 0 0 rgba(255,50,70,0.09),
      inset -1.5px 0 0 rgba(30,80,255,0.09),
      0 -12px 50px rgba(0,0,0,0.45);
  }
  .settings-modal-content::before {
    content: ''; display: block; width: 36px; height: 5px;
    background: rgba(255,255,255,0.25); border-radius: 3px; margin: 0 auto 20px;
  }
  .settings-modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 18px; letter-spacing: -0.2px; }
  .settings-section { margin-bottom: 24px; }
  .settings-section:last-child { margin-bottom: 4px; }
  .settings-section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0;
  }
  .settings-row-label { font-size: 15px; font-weight: 500; }
  .settings-day-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    padding: 11px 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.05);
  }
  .settings-day-row:last-child { border-bottom: none; }
  .settings-day-name { font-size: 14px; font-weight: 600; flex-shrink: 0; width: 38px; }
  .daytype-group { display: flex; gap: 6px; flex-wrap: nowrap; }
  .daytype-btn {
    padding: 6px 11px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    background: rgba(255,255,255,0.06);
    color: var(--text2);
    border: 0.5px solid var(--border2);
    transition: background 0.15s, color 0.15s, border-color 0.15s, opacity 0.15s;
    white-space: nowrap;
  }
  .daytype-btn:active { opacity: 0.7; }
  .daytype-btn.active.t-push { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }
  .daytype-btn.active.t-pull { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
  .daytype-btn.active.t-legs { background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber); }
  .daytype-btn.active.t-upper { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }
  .daytype-btn.active.t-lower { background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber); }
  .daytype-btn.active.t-rest { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.26); color: var(--text); }
  body.theme-glass .daytype-btn { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .settings-done-btn {
    width: 100%; padding: 15px; border-radius: var(--radius-btn);
    font-size: 16px; font-weight: 600; cursor: pointer;
    font-family: inherit; margin-top: 6px;
    background: var(--blue); color: #fff; border: none;
    transition: opacity 0.15s;
  }
  .settings-done-btn:active { opacity: 0.75; }
  body.theme-glass .settings-done-btn {
    background: linear-gradient(165deg, rgba(40,150,255,0.95), rgba(10,110,235,0.92));
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.4), 0 4px 14px rgba(10,132,255,0.35);
  }

  /* Radius transitions for glass mode */
  body.theme-glass {
    --radius-card: 32px;
    --radius-btn:  20px;
    --radius-input:16px;
  }

  /* ── FOOD FAB (LEFT side, slides to center when open) ── */
  #food-fab {
    position: relative;
    z-index: 2;
    flex-shrink: 0;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.35s ease, box-shadow 0.35s ease, transform 0.18s ease;
    background: var(--bg3);
    border: 0.5px solid rgba(255,255,255,0.14);
    box-shadow: 0 6px 24px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
    -webkit-tap-highlight-color: transparent;
    will-change: transform;
  }
  body.theme-glass #food-fab {
    background: linear-gradient(145deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.06) 50%, rgba(0,0,0,0.06) 100%);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 0.5px solid rgba(255,255,255,0.24);
    box-shadow: 
      inset 0 1px 0.5px rgba(255,255,255,0.26),
      inset 0 -1px 2px rgba(0,0,0,0.20),
      inset 1px 0 0 rgba(255,50,70,0.10),
      inset -1px 0 0 rgba(30,80,255,0.10),
      0 10px 36px rgba(0,0,0,0.55), 0 3px 10px rgba(0,0,0,0.3);
  }
  #food-fab:active { transform: scale(0.92); }
  #food-fab svg {
    width: 24px; height: 24px;
    transition: opacity 0.2s ease, transform 0.24s cubic-bezier(0.34,1.1,0.64,1);
    position: absolute;
    fill: none;
    stroke: var(--text2);
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  #food-fab .fab-icon-food  { opacity: 1; transform: rotate(0deg) scale(1); }
  /* X close icon — hidden by default, shown when nutrition panel is open */
  #food-fab .fab-icon-close { opacity: 0; transform: scale(0.5) rotate(-45deg); }
  body.food-open #food-fab .fab-icon-food  { opacity: 0; transform: scale(0.5); }
  body.food-open #food-fab .fab-icon-close { opacity: 1; transform: scale(1) rotate(0deg); transition-delay: 0.22s; }

  /* ── tab-bar-inner stays a pill at all times — its CONTENT swaps between ── */
  /* workout day/exercise tabs and the nutrition tabs (food/grocery/weight). */
  /* The width transition below lets it smoothly resize whenever the number  */
  /* of buttons inside it changes (e.g. 7 day tabs → 3 nutrition tabs).      */
  #tab-bar-inner {
    overflow: hidden;
    transition: background 0.35s, box-shadow 0.35s, border-color 0.35s,
                width  0.46s cubic-bezier(0.4,0,0.2,1),
                height 0.46s cubic-bezier(0.4,0,0.2,1),
                border-radius 0.46s cubic-bezier(0.4,0,0.2,1),
                min-width 0.46s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Reversed layout when nutrition panel is open ── */
  /* Normally: [food-fab circle (left)] [tab-bar-inner pill (right)].        */
  /* When open: [tab-bar-inner pill (left, nutrition tabs)] [food-fab circle */
  /* showing an X to close (right)] — same pieces, swapped order.            */
  body.food-open #tab-bar-inner { order: 2; }
  body.food-open #food-fab      { order: 1; }

  /* Nutrition tab buttons (Food Log / Grocery List / Weight Log) — sized to */
  /* fit their label instead of the fixed 78px day/exercise tab width.       */
  .tab-btn.food-tab {
    width: auto;
    padding: 9px 16px;
    white-space: nowrap;
  }

  // Re-position pill after class changes (border-radius etc may shift layout)

function toggleTheme() {

}

applyTheme();
// Apply saved split system class on load
document.body.classList.toggle('split-ul', (localStorage.getItem('fitlog-split-system') || 'ppl') === 'ul');

// ── Data ────────────────────────────────────────────────────────────────────

    exercises: [

  },

    exercises: [
      { name: 'Deadlift', type: 'legs' },
      { name: 'Hack squat', type: 'legs' },

  }
};

// Load ROUTINES from localStorage if available, otherwise use defaults
const savedRoutines = JSON.parse(localStorage.getItem('fitlog-routines') || 'null');
if (savedRoutines) ROUTINES = savedRoutines;

const ALL_EXERCISES = [
  { name: 'Incline barbell press', type: 'push' }, { name: 'Cable fly (low to high)', type: 'push' },
  { name: 'Dips', type: 'push' }, { name: 'Shoulder press machine', type: 'push' },
  { name: 'Lateral raise', type: 'push' }, { name: 'Tricep rope pushdown', type: 'push' },
  { name: 'Pull-ups (or lat pulldown)', type: 'pull' }, { name: 'T-bar row', type: 'pull' },
  { name: 'Cable row (close grip)', type: 'pull' }, { name: 'Reverse pec deck', type: 'pull' },
  { name: 'Standing preacher curl', type: 'pull' }, { name: 'Incline dumbbell curl', type: 'pull' },
  { name: 'Barbell squat', type: 'legs' }, { name: 'Leg press', type: 'legs' },
  { name: 'Leg curl', type: 'legs' }, { name: 'Romanian deadlift', type: 'legs' },
  { name: 'Calf raise', type: 'legs' }, { name: 'Dumbbell shoulder press', type: 'push' },
  { name: 'Dumbbell bench press', type: 'push' }, { name: 'Machine fly', type: 'push' },
  { name: 'Plate-loaded dip', type: 'push' }, { name: 'Skull crusher', type: 'push' },
  { name: 'Barbell curl', type: 'pull' }, { name: 'Seal row', type: 'pull' },
  { name: 'Machine row', type: 'pull' }, { name: 'Face pull', type: 'pull' },
  { name: 'Dumbbell curl', type: 'pull' }, { name: 'Deadlift', type: 'legs' },
  { name: 'Hack squat', type: 'legs' }, { name: 'Leg extension', type: 'legs' },
  { name: 'Seated calf raise', type: 'legs' },
];

// ── Day-type settings ─────────────────────────────────────────────────────────
// Lets the user reassign what kind of workout day each weekday is (Push/Pull/
// Legs/Rest or Upper/Lower/Rest) from the Settings panel. Changing a day's type swaps in a
// generic template for that type; days the user never touches keep their
// original hand-tuned routine from ROUTINES above.
const DAY_ORDER = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_ABBR  = { Monday:'Mon', Tuesday:'Tue', Wednesday:'Wed', Thursday:'Thu', Friday:'Fri', Saturday:'Sat', Sunday:'Sun' };

function getDAY_TYPES() {
  return SPLIT_SYSTEMS[currentSplitSystem].types;
}

const TYPE_INFO = {
  push: { label: 'Push', sub: 'chest focus', title: 'Chest · Shoulders · Triceps' },
  pull: { label: 'Pull', sub: 'back focus',  title: 'Back · Biceps · Rear delt' },
  legs: { label: 'Legs', sub: 'leg focus',   title: 'Quads · Hamstrings · Calves' },
  upper: { label: 'Upper', sub: 'upper body', title: 'Chest · Back · Shoulders' },
  lower: { label: 'Lower', sub: 'lower body', title: 'Quads · Hamstrings · Calves' },
  rest: { label: 'Rest', sub: '',            title: 'Recovery' },
};

// Generic exercise sets used whenever a day is (re)assigned a type via Settings.
const TYPE_EXERCISES = {
  push: [
    { name: 'Incline barbell press', type: 'push' },
    { name: 'Cable fly (low to high)', type: 'push' },
    { name: 'Dips', type: 'push' },
    { name: 'Shoulder press machine', type: 'push', shoulder: true },
    { name: 'Lateral raise', type: 'push', shoulder: true },
    { name: 'Tricep rope pushdown', type: 'push' },
  ],
  pull: [
    { name: 'Pull-ups (or lat pulldown)', type: 'pull' },
    { name: 'T-bar row', type: 'pull' },
    { name: 'Cable row (close grip)', type: 'pull' },
    { name: 'Reverse pec deck', type: 'pull' },
    { name: 'Standing preacher curl', type: 'pull' },
    { name: 'Incline dumbbell curl', type: 'pull' },
  ],
  legs: [
    { name: 'Barbell squat', type: 'legs' },
    { name: 'Leg press', type: 'legs' },
    { name: 'Leg curl', type: 'legs' },
    { name: 'Romanian deadlift', type: 'legs' },
    { name: 'Calf raise', type: 'legs' },
  ],
  upper: [
    { name: 'Incline barbell press', type: 'upper' },
    { name: 'Pull-ups (or lat pulldown)', type: 'upper' },
    { name: 'Dumbbell bench press', type: 'upper' },
    { name: 'T-bar row', type: 'upper' },
    { name: 'Shoulder press machine', type: 'upper', shoulder: true },
    { name: 'Face pull', type: 'upper', shoulder: true },
  ],
  lower: [
    { name: 'Barbell squat', type: 'lower' },
    { name: 'Leg press', type: 'lower' },
    { name: 'Leg curl', type: 'lower' },
    { name: 'Romanian deadlift', type: 'lower' },
    { name: 'Calf raise', type: 'lower' },
  ],
  rest: [],
};

const DAY_OVERRIDES_KEY = 'fitlog-day-overrides';
const SPLIT_SYSTEM_KEY = 'fitlog-split-system';

let currentSplitSystem = localStorage.getItem(SPLIT_SYSTEM_KEY) || 'ppl'; // 'ppl' or 'ul'

const SPLIT_SYSTEMS = {
  ppl: { label: 'Push/Pull/Legs', types: ['push', 'pull', 'legs', 'rest'] },
  ul: { label: 'Upper/Lower', types: ['upper', 'lower', 'rest'] }
};

function getDayOverrides() {
  try { return JSON.parse(localStorage.getItem(DAY_OVERRIDES_KEY) || '{}'); }
  catch (e) { return {}; }
}

function saveDayOverrides(overrides) {
  localStorage.setItem(DAY_OVERRIDES_KEY, JSON.stringify(overrides));
}

// Reassigns `day` to `newType`, swapping in the generic template for that
// type. Persists the change (unless persist === false, used when re-applying
// saved overrides on page load).
function applyDayType(day, newType, persist = true) {
  const info = TYPE_INFO[newType];
  ROUTINES[day] = {
    label: newType === 'rest' ? `Rest — ${DAY_ABBR[day]}` : `${info.label} — ${DAY_ABBR[day]}`,
    badge: newType,
    title: info.title,
    exercises: TYPE_EXERCISES[newType].map(ex => ({ ...ex })),
  };
  if (persist) {
    const overrides = getDayOverrides();
    overrides[day] = newType;
    saveDayOverrides(overrides);
  }
}

// Apply any previously-saved day-type overrides on top of the default ROUTINES.
(function applySavedDayOverrides() {
  const overrides = getDayOverrides();
  Object.keys(overrides).forEach(day => {
    if (DAY_ORDER.includes(day) && ROUTINES[day]) applyDayType(day, overrides[day], false);
  });
})();

// Builds the horizontally-scrolling day cards from current ROUTINES state.
function renderDayCards() {
  const scroll = document.querySelector('.day-scroll');
  scroll.innerHTML = DAY_ORDER.map(day => {
    const r = ROUTINES[day];
    const subHtml = r.badge === 'rest' ? '' : `<div class="wd-sub">${TYPE_INFO[r.badge].sub}</div>`;
    const typeLabel = TYPE_INFO[r.badge].label;
    return `<div class="day-card ${r.badge}" onclick="selectDay('${day}')"><div class="wd-name">${DAY_ABBR[day]}</div><div class="wd-type">${typeLabel}</div>${subHtml}</div>`;
  }).join('');
  
  // Attach swipe-left listener to day-scroll for navigation to nutrition
  _attachDayScrollSwipeListener();
}

// Swipe-right past Monday (at scroll start) opens nutrition;
// swipe-left on the nutrition panel closes it.
function _attachDayScrollSwipeListener() {
  const scroll = document.querySelector('.day-scroll');
  if (!scroll || scroll._swipeListenerAttached) return;

  let touchStart = null;

  scroll.addEventListener('touchstart', (e) => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });

  scroll.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const dx = touchStart.x - e.changedTouches[0].clientX;
    const dy = Math.abs(touchStart.y - e.changedTouches[0].clientY);
    touchStart = null;

    if (dy > 60 || Math.abs(dx) < 40) return;

    if (dx < 0) {
      // Swipe right — only open nutrition if already at the leftmost card
      const atStart = scroll.scrollLeft <= 20;
      if (atStart) openFoodPanel();
    }
  }, { passive: true });

  scroll._swipeListenerAttached = true;
}

// Swipe-left on the food panel to close it back to days
(function _attachFoodPanelSwipeClose() {
  const panel = document.getElementById('food-panel');
  if (!panel) return;
  let tx = null;
  panel.addEventListener('touchstart', (e) => {
    tx = e.touches[0].clientX;
  }, { passive: true });
  panel.addEventListener('touchend', (e) => {
    if (tx === null) return;
    const dx = tx - e.changedTouches[0].clientX;
    tx = null;
    if (dx > 60) closeFoodPanel(); // swipe left = positive dx
  }, { passive: true });
})();

// ── Settings modal ────────────────────────────────────────────────────────────
function openSettings() {
  renderSettingsDayList();
  
  // Update split system label and toggle
  const label = document.getElementById('split-system-label');
  if (label) label.textContent = currentSplitSystem === 'ul' ? 'UL' : 'PPL';
  document.body.classList.toggle('split-ul', currentSplitSystem === 'ul');
  
  document.getElementById('settings-modal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}

function closeSettingsOutside(e) {
  if (e.target === document.getElementById('settings-modal')) closeSettings();
}

// Swipe-down-to-dismiss: dragging down on the sheet (while its content is
// scrolled to the top) follows the finger, and releasing past a small
// threshold commits the close — same gesture as the iOS "drag handle" sheets,
// but works from anywhere on the sheet, not just the handle.
let _settingsDrag = null;

function _settingsSheetEl() { return document.querySelector('.settings-modal-content'); }

function _settingsDragStart(clientY) {
  const sheet = _settingsSheetEl();
  _settingsDrag = { startY: clientY, currentY: clientY, dragging: false, startScrollTop: sheet.scrollTop };
}

// Returns true if this gesture is being used to drag the sheet (so the
// caller should suppress native scrolling for this move).
function _settingsDragMove(clientY) {
  if (!_settingsDrag) return false;
  const sheet = _settingsSheetEl();
  _settingsDrag.currentY = clientY;
  const deltaY = clientY - _settingsDrag.startY;

  if (!_settingsDrag.dragging) {
    if (deltaY > 6 && sheet.scrollTop <= 0) {
      _settingsDrag.dragging = true;
    } else {
      // Either scrolling up inside the list, or not enough movement yet —
      // let the browser handle it natively.
      return false;
    }
  }

  const clamped = Math.max(0, deltaY);
  sheet.style.transition = 'none';
  sheet.style.transform = `translateY(${clamped}px)`;
  return true;
}

function _settingsDragEnd() {
  if (!_settingsDrag) return;
  const sheet = _settingsSheetEl();
  const wasDragging = _settingsDrag.dragging;
  const deltaY = _settingsDrag.currentY - _settingsDrag.startY;
  _settingsDrag = null;
  sheet.style.transition = '';
  sheet.style.transform = '';
  if (wasDragging && deltaY > 110) closeSettings();
}

(function attachSettingsDragOnce() {
  const sheet = _settingsSheetEl();

  sheet.addEventListener('touchstart', e => {
    _settingsDragStart(e.touches[0].clientY);
  }, { passive: true });

  sheet.addEventListener('touchmove', e => {
    if (_settingsDragMove(e.touches[0].clientY)) e.preventDefault();
  }, { passive: false });

  sheet.addEventListener('touchend', () => _settingsDragEnd(), { passive: true });

  sheet.addEventListener('mousedown', e => {
    _settingsDragStart(e.clientY);
  });
  window.addEventListener('mousemove', e => {
    if (_settingsDrag) _settingsDragMove(e.clientY);
  });
  window.addEventListener('mouseup', () => _settingsDragEnd());
})();

function toggleSplitSystem() {
  currentSplitSystem = currentSplitSystem === 'ppl' ? 'ul' : 'ppl';
  localStorage.setItem(SPLIT_SYSTEM_KEY, currentSplitSystem);
  
  // Update toggle appearance
  const label = document.getElementById('split-system-label');
  if (label) label.textContent = currentSplitSystem === 'ul' ? 'UL' : 'PPL';
  document.body.classList.toggle('split-ul', currentSplitSystem === 'ul');
  
  applySplitSystemToAllDays();
  renderSettingsDayList();
  renderDayCards();
  renderDayTabs();
  if (currentDay) {
    renderExerciseCards(currentDay);
    renderExTabs(ROUTINES[currentDay].exercises);
  }
}

function applySplitSystemToAllDays() {
  const overrides = getDayOverrides();
  const currentTypes = Object.keys(overrides).map(day => overrides[day]);
  
  // Map old types to new types based on split system
  Object.keys(overrides).forEach(day => {
    const oldType = overrides[day];
    let newType = oldType;
    
    if (currentSplitSystem === 'ul') {
      // Convert PPL to Upper/Lower
      if (oldType === 'push' || oldType === 'pull') {
        newType = 'upper';
      } else if (oldType === 'legs') {
        newType = 'lower';
      }
    } else if (currentSplitSystem === 'ppl') {
      // Keep as is or convert from Upper/Lower to PPL
      if (oldType === 'upper') {
        newType = 'push'; // Default to push for upper days
      } else if (oldType === 'lower') {
        newType = 'legs'; // Default to legs for lower days
      }
    }
    
    applyDayType(day, newType, false);
  });
  
  saveDayOverrides(overrides);
}

function renderSettingsDayList() {
  const list = document.getElementById('settings-day-list');
  list.innerHTML = DAY_ORDER.map(day => {
    const current = ROUTINES[day].badge;
    const buttons = getDAY_TYPES().map(t => {
      const active = t === current ? `active t-${t}` : '';
      return `<button class="daytype-btn ${active}" onclick="changeDayType('${day}','${t}')">${TYPE_INFO[t].label}</button>`;
    }).join('');
    return `<div class="settings-day-row"><div class="settings-day-name">${DAY_ABBR[day]}</div><div class="daytype-group">${buttons}</div></div>`;
  }).join('');
}

function changeDayType(day, newType) {
  if (ROUTINES[day].badge === newType) return;
  applyDayType(day, newType);
  renderSettingsDayList();
  renderDayCards();

  if (currentDay === day) {
    if (newType === 'rest') {
      // Rest days have no exercises — back out of the now-empty exercise view.
      closeSettings();
      backToDays();
    } else {
      renderExerciseCards(day);
      renderExTabs(ROUTINES[day].exercises);
      animateHeader(ROUTINES[day].label, true);
    }
  } else if (currentDay === null) {
    renderDayTabs();
  }
}

// ── Tab drag-to-switch ───────────────────────────────────────────────────────
let _tabDrag = null;
let _tabOnSelect = null;

function _getBtnAt(x, y) {
  const el = document.elementFromPoint(x, y);
  return el ? el.closest('.tab-btn') : null;
}

function _tabBtnIndex(btn) {
  const btns = Array.from(document.querySelectorAll('#tab-bar-inner .tab-btn'));
  return btns.indexOf(btn);
}

(function attachOnce() {
  const inner = document.getElementById('tab-bar-inner');

  inner.addEventListener('touchstart', e => {
    const t = e.touches[0];
    const btn = _getBtnAt(t.clientX, t.clientY);
    if (!btn) return;
    _tabDrag = { startX: t.clientX, startBtn: btn, lastBtn: btn, dragging: false };
  }, { passive: true });

  inner.addEventListener('touchmove', e => {
    if (!_tabDrag) return;
    const t = e.touches[0];
    const dx = Math.abs(t.clientX - _tabDrag.startX);
    if (dx > 6) _tabDrag.dragging = true;
    if (!_tabDrag.dragging) return;
    // Do NOT preventDefault — let touch-action:pan-x handle native scrolling
    // so the user can swipe to reveal hidden tabs (Thu–Sun).
    // We still update the pill scrub position based on scroll-adjusted coords.
    const btns = Array.from(inner.querySelectorAll('.tab-btn'));
    const innerRect = inner.getBoundingClientRect();
    const x = t.clientX - innerRect.left + inner.scrollLeft;
    const fracIdx = _computeFracIdx(btns, x, innerRect);
    _setScrubPosition(fracIdx);
  }, { passive: true });

  inner.addEventListener('touchend', e => {
    if (!_tabDrag) return;
    document.querySelectorAll('#tab-bar-inner .tab-btn').forEach(b => b.classList.remove('drag-hover'));
    if (!_tabDrag.dragging) {
      const t = e.changedTouches[0];
      const btn = _getBtnAt(t.clientX, t.clientY) || _tabDrag.startBtn;
      const idx = _tabBtnIndex(btn);
      if (idx !== -1 && _tabOnSelect) _tabOnSelect(idx);
    } else {
      const snapped = Math.round(_pillIdx);
      setActiveTab(snapped, true);
      if (_tabOnSelect) _tabOnSelect(snapped);
    }
    _tabDrag = null;
  }, { passive: true });

  inner.addEventListener('mousedown', e => {
    const btn = _getBtnAt(e.clientX, e.clientY);
    if (!btn) return;
    _tabDrag = { startX: e.clientX, startBtn: btn, lastBtn: btn, dragging: false };
  });

  window.addEventListener('mousemove', e => {
    if (!_tabDrag) return;
    const dx = Math.abs(e.clientX - _tabDrag.startX);
    if (dx > 6) _tabDrag.dragging = true;
    if (!_tabDrag.dragging) return;
    const inner2 = document.getElementById('tab-bar-inner');
    const btns = Array.from(inner2.querySelectorAll('.tab-btn'));
    const innerRect = inner2.getBoundingClientRect();
    const x = e.clientX - innerRect.left + inner2.scrollLeft;
    const fracIdx = _computeFracIdx(btns, x, innerRect);
    _setScrubPosition(fracIdx);
  });

  window.addEventListener('mouseup', e => {
    if (!_tabDrag) return;
    document.querySelectorAll('#tab-bar-inner .tab-btn').forEach(b => b.classList.remove('drag-hover'));
    if (!_tabDrag.dragging) {
      const btn = _getBtnAt(e.clientX, e.clientY) || _tabDrag.startBtn;
      const idx = _tabBtnIndex(btn);
      if (idx !== -1 && _tabOnSelect) _tabOnSelect(idx);
    } else {
      const snapped = Math.round(_pillIdx);
      setActiveTab(snapped, true);
      if (_tabOnSelect) _tabOnSelect(snapped);
    }
    _tabDrag = null;
  });
})();

// Compute fractional index accounting for scroll offset inside tab bar
function _computeFracIdx(btns, xRelativeToInnerWithScroll, innerRect) {
  // xRelativeToInnerWithScroll = clientX - innerRect.left + inner.scrollLeft
  // But btn rects are in viewport coords; we need to convert consistently
  // Use scrollLeft-adjusted positions:
  const inner = document.getElementById('tab-bar-inner');
  let fracIdx = 0;
  for (let i = 0; i < btns.length; i++) {
    const r = btns[i].getBoundingClientRect();
    const btnLeft = r.left - innerRect.left + inner.scrollLeft;
    const center = btnLeft + r.width / 2;
    if (i === 0 && xRelativeToInnerWithScroll <= center) { fracIdx = 0; break; }
    if (i === btns.length - 1 && xRelativeToInnerWithScroll >= center) { fracIdx = btns.length - 1; break; }
    if (i < btns.length - 1) {
      const nextR = btns[i+1].getBoundingClientRect();
      const nextLeft = nextR.left - innerRect.left + inner.scrollLeft;
      const nextCenter = nextLeft + nextR.width / 2;
      if (xRelativeToInnerWithScroll >= center && xRelativeToInnerWithScroll <= nextCenter) {
        fracIdx = i + (xRelativeToInnerWithScroll - center) / (nextCenter - center);
        break;
      }
    }
  }
  return fracIdx;
}

// Wires a card-carousel scroll container so the tab pill / active-tab
// highlighting live-tracks the swipe in real time, matching the position of
// whichever card is currently centered as you drag through the carousel.
function _wireCardScrollSync(scroll, totalCards) {
  scroll.addEventListener('scroll', () => {
    const maxScroll = scroll.scrollWidth - scroll.offsetWidth;
    const frac = maxScroll > 0 ? (scroll.scrollLeft / maxScroll) * (totalCards - 1) : 0;
    const clamped = Math.max(0, Math.min(frac, totalCards - 1));
    _setScrubPosition(clamped);
  }, { passive: true });
}

// Figures out which card is currently centered/visible in a horizontally
// scrolling carousel, based on its live scrollLeft — used to keep the tab
// bar's active pill in sync with whatever card the carousel is actually
// showing (e.g. after backing out of a view where the carousel kept its
// previous scroll position instead of resetting to the first card).
function _nearestCardIndex(scroll, totalCards) {
  const maxScroll = scroll.scrollWidth - scroll.offsetWidth;
  if (maxScroll <= 0) return 0;
  const frac = (scroll.scrollLeft / maxScroll) * (totalCards - 1);
  return Math.max(0, Math.min(Math.round(frac), totalCards - 1));
}

function renderDayTabs() {
  const scroll = document.querySelector('.day-scroll');
  const inner = document.getElementById('tab-bar-inner');
  inner.innerHTML = '';

  DAY_ORDER.forEach(day => {
    const r = ROUTINES[day];
    const btn = document.createElement('button');
    btn.className = `tab-btn t-${r.badge}`;
    const subText = r.badge === 'rest' ? 'Rest' : TYPE_INFO[r.badge].label;
    btn.innerHTML = `<div class="tab-label">${DAY_ABBR[day]}</div><div class="tab-sub">${subText}</div>`;
    inner.appendChild(btn);
  });

  // Sync pill from day card scroll — pill/highlight live-track the swipe
  // in real time as the user drags through the day cards.
  _wireCardScrollSync(scroll, DAY_ORDER.length);

  _tabOnSelect = (idx) => {
    const cards = scroll.children;
    if (cards[idx]) cards[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    setActiveTab(idx);
  };

  // Match the active tab to whichever day card the carousel is actually
  // showing right now, instead of always defaulting to the first tab.
  setActiveTab(_nearestCardIndex(scroll, DAY_ORDER.length), false);
}

function renderExTabs(exercises) {

  inner.appendChild(addBtn);

  const totalTabs = exercises.length + 1;
  _wireCardScrollSync(scroll, totalTabs);

  setActiveTab(_nearestCardIndex(scroll, totalTabs), false);

  _tabOnSelect = (idx) => {
    const cards = scroll.children;
    if (cards[idx]) cards[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    setActiveTab(idx);
  };
}
