// ── Sliding pill ─────────────────────────────────────────────────────────────
const TAB_COLORS = {
  't-push': [10,  132, 255, 0.30],
  't-pull': [48,  209,  88, 0.26],
  't-legs': [255, 159,  10, 0.28],
  't-upper': [10,  132, 255, 0.30],
  't-lower': [255, 159,  10, 0.28],
  't-rest': [255, 255, 255, 0.09],
  'food-tab':[255, 255, 255, 0.16],
  'default':[255, 255, 255, 0.11],
};

function _getTabColor(btn) {
  for (const [cls, rgba] of Object.entries(TAB_COLORS)) {
    if (btn.classList.contains(cls)) return rgba;
  }
  return TAB_COLORS.default;
}

function _lerpColor(a, b, t) {
  return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t, a[3]+(b[3]-a[3])*t];
}

function _toRgba([r,g,b,a]) {
  return `rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${a.toFixed(3)})`;
}

function _ensurePill() {
  const inner = document.getElementById('tab-bar-inner');
  let pill = document.getElementById('tab-pill');
  if (!pill) {
    pill = document.createElement('div');
    pill.id = 'tab-pill';
    inner.insertBefore(pill, inner.firstChild);
  }
  return pill;
}

function _updatePill(fractionalIdx, animate = true) {
  const inner = document.getElementById('tab-bar-inner');
  const pill  = _ensurePill();
  const btns  = Array.from(inner.querySelectorAll('.tab-btn'));
  if (!btns.length) return;

  const clampedIdx = Math.max(0, Math.min(fractionalIdx, btns.length - 1));
  const loIdx = Math.floor(clampedIdx);
  const hiIdx = Math.min(loIdx + 1, btns.length - 1);
  const t     = clampedIdx - loIdx;

  const loBtn = btns[loIdx];
  const hiBtn = btns[hiIdx];

  // Use scroll-adjusted positions for accurate pill placement
  const innerRect = inner.getBoundingClientRect();
  const loRect    = loBtn.getBoundingClientRect();
  const hiRect    = hiBtn.getBoundingClientRect();

  const loLeft = loRect.left - innerRect.left + inner.scrollLeft;
  const hiLeft = hiRect.left - innerRect.left + inner.scrollLeft;

  const left  = loLeft + (hiLeft - loLeft) * t;
  const width = loRect.width + (hiRect.width - loRect.width) * t;

  const loColor = _getTabColor(loBtn);
  const hiColor = _getTabColor(hiBtn);
  const color   = _lerpColor(loColor, hiColor, t);

  if (animate) {
    pill.style.transition = 'left 0.28s cubic-bezier(0.34,1.1,0.64,1), width 0.28s cubic-bezier(0.34,1.1,0.64,1), background-color 0.28s ease';
  } else {
    pill.style.transition = 'none';
  }

  pill.style.left            = left + 'px';
  pill.style.width           = width + 'px';
  pill.style.backgroundColor = _toRgba(color);
}

let _pillIdx = 0;

function setActiveTab(idx, animate = true) {
  _pillIdx = idx;
  const btns = document.querySelectorAll('#tab-bar-inner .tab-btn');
  btns.forEach((b, i) => {
    b.classList.toggle('active', i === idx);
    b.style.color = i === idx ? '#fff' : '';
  });
  _updatePill(idx, animate);

  // Auto-scroll tab bar to keep active tab visible
  const inner = document.getElementById('tab-bar-inner');
  const pill = document.getElementById('tab-pill');
  if (pill && inner) {
    const pillLeft = parseFloat(pill.style.left) || 0;
    const pillWidth = parseFloat(pill.style.width) || 0;
    const pillCenter = pillLeft + pillWidth / 2;
    const barWidth = inner.offsetWidth;
    // scroll to center the pill in view
    const targetScroll = pillCenter - barWidth / 2;
    inner.scrollTo({ left: Math.max(0, targetScroll), behavior: animate ? 'smooth' : 'instant' });

    // Re-measure and snap the pill into its exact final position once the
    // scroll has settled. This guards against any timing drift between the
    // initial _updatePill() call (above) and the scroll animation, so the
    // pill always ends up precisely centered on its tab regardless of when
    // layout/scroll settles.
    const resync = () => _updatePill(_pillIdx, false);
    if (animate) {
      if ('onscrollend' in window) {
        inner.addEventListener('scrollend', resync, { once: true });
      } else {
        setTimeout(resync, 360);
      }
    } else {
      resync();
    }
  }
}

function _setScrubPosition(fractionalIdx) {
  _pillIdx = fractionalIdx;
  const inner = document.getElementById('tab-bar-inner');
  const btns = Array.from(document.querySelectorAll('#tab-bar-inner .tab-btn'));
  const rounded = Math.round(fractionalIdx);
  btns.forEach((b, i) => {
    const isActive = i === rounded;
    b.classList.toggle('active', isActive);
    b.style.color = isActive ? '#fff' : '';
  });
  _updatePill(fractionalIdx, false);

  // Scroll the tab bar so the active tab is always visible
  if (inner && btns[rounded]) {
    const btn = btns[rounded];
    const btnLeft = btn.offsetLeft;
    const btnRight = btnLeft + btn.offsetWidth;
    const barLeft = inner.scrollLeft;
    const barRight = barLeft + inner.offsetWidth;
    if (btnLeft < barLeft + 8) {
      inner.scrollTo({ left: btnLeft - 8, behavior: 'smooth' });
    } else if (btnRight > barRight - 8) {
      inner.scrollTo({ left: btnRight - inner.offsetWidth + 8, behavior: 'smooth' });
    }
  }
}

function transitionViews(outEl, inEl, direction) {
  const fromClass = direction === 'forward' ? 'slide-from-right' : 'slide-from-left';
  inEl.classList.remove('active', 'slide-from-right', 'slide-from-left');
  inEl.classList.add(fromClass);
  inEl.offsetHeight;
  // Don't remove 'active' if the element is frozen — frozen CSS keeps it visible as backdrop
  if (!outEl.classList.contains('frozen')) outEl.classList.remove('active');
  inEl.classList.add('active');
  inEl.addEventListener('transitionend', () => {
    inEl.classList.remove('slide-from-right', 'slide-from-left');
  }, { once: true });
}

function animateHeader(newTitle, showBack) {
  const titleEl = document.getElementById('header-title');
  const backEl  = document.getElementById('header-back');
  titleEl.style.transition = 'opacity 0.18s ease, transform 0.18s ease';
  titleEl.style.opacity = '0';
  titleEl.style.transform = 'translateY(-6px)';
  setTimeout(() => {
    titleEl.textContent = newTitle;
    titleEl.style.opacity = '1';
    titleEl.style.transform = 'translateY(0)';
    if (showBack) backEl.classList.add('visible');
    else backEl.classList.remove('visible');
  }, 160);
}

function selectDay(day) {
  if (ROUTINES[day].exercises.length === 0) { alert('Rest day — no exercises!'); return; }
  currentDay = day;
  const routine = ROUTINES[day];
  renderExerciseCards(day);
  _morphInnerToContent(() => renderExTabs(routine.exercises));
  animateHeader(routine.label, true);
  document.getElementById('view-days').classList.add('frozen');
  transitionViews(
    document.getElementById('view-days'),
    document.getElementById('view-exercises'),
    'forward'
  );
}

function backToDays() {
  currentDay = null;
  _morphInnerToContent(renderDayTabs);
  animateHeader('My Fitness Plan', false);
  const viewDays = document.getElementById('view-days');
  const viewEx   = document.getElementById('view-exercises');
  // Unfreeze first so view-days transitions normally back in
  viewDays.classList.remove('frozen');
  // Manually set it up for the incoming transition
  viewDays.classList.remove('active', 'slide-from-right', 'slide-from-left');
  viewDays.classList.add('slide-from-left');
  viewDays.offsetHeight;
  viewEx.classList.remove('active');
  viewDays.classList.add('active');
  viewDays.addEventListener('transitionend', () => {
    viewDays.classList.remove('slide-from-left');
  }, { once: true });
}

function renderExerciseCards(day) {
  const routine = ROUTINES[day];
  const today = new Date().toISOString().split('T')[0];
  const logData = getLogEntries();
  const container = document.getElementById('ex-scroll');
  container.innerHTML = '';

  routine.exercises.forEach((ex, idx) => {
    const cardId = `ex-card-${idx}`;
    const entries = logData[ex.name] || [];
    const shown = entries.slice(-3).reverse();

    let prevHtml = '';
    if (shown.length > 0) {
      const safeName = ex.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      prevHtml = `<div class="prev-section"><div class="prev-section-head"><h4>Previous</h4><button style="background:none;border:none;color:var(--red);font-size:12px;font-weight:700;cursor:pointer;padding:4px 0;font-family:inherit;letter-spacing:0.02em" onclick="clearEntries('${safeName}','${cardId}')">Clear All</button></div>`;
      shown.forEach((entry, i) => {
        const d = new Date(entry.date + 'T12:00:00');
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const setsStr = entry.sets.map(s => `${s.reps}×${s.weight}lb`).join('  ');
        let prog = '';
        if (i < shown.length - 1) {
          const curr = bestSet(entry.sets), prev = bestSet(shown[i+1].sets);
          if (curr && prev) {
            const wD = curr.w - prev.w, rD = curr.r - prev.r;
            if (wD > 0) prog = `<div class="prev-entry-progress up">▲ +${wD} lbs</div>`;
            else if (wD < 0) prog = `<div class="prev-entry-progress down">▼ ${wD} lbs</div>`;
            else if (rD > 0) prog = `<div class="prev-entry-progress up">▲ +${rD} reps</div>`;
            else if (rD < 0) prog = `<div class="prev-entry-progress down">▼ ${rD} reps</div>`;
            else prog = `<div class="prev-entry-progress same">Same</div>`;
          }
        } else {
          prog = `<div class="prev-entry-progress same">First</div>`;
        }
        prevHtml += `<div class="prev-entry"><div><div class="prev-entry-date">${dateStr}</div><div class="prev-entry-sets">${setsStr}</div></div>${prog}</div>`;
      });
      prevHtml += '</div>';
    }

    const badgeLabel = ex.shoulder ? 'Shoulders' : (ex.type.charAt(0).toUpperCase() + ex.type.slice(1));
    const badgeClass = ex.shoulder ? 'shoulder' : ex.type;

    const card = document.createElement('div');
    card.className = `ex-card ${ex.type}`;
    card.id = cardId;
    card.innerHTML = `
      <div class="ex-card-header">
        <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
          <div class="ex-card-name">${ex.name}</div>
          <span class="ex-card-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;margin-top:2px">
          <button class="ex-icon-btn" title="Replace" data-exname="${ex.name.replace(/\`/g,'')}" data-exidx="${idx}" onclick="openReplaceModal(this.dataset.exname, parseInt(this.dataset.exidx))">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
          <button class="ex-icon-btn ex-icon-btn-del" title="Remove" data-exname="${ex.name.replace(/\`/g,'')}" data-exidx="${idx}" onclick="removeExercise(parseInt(this.dataset.exidx), this.dataset.exname)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      <div class="ex-card-body">
        <div class="ex-date-row">
          <span class="ex-date-label">Date</span>
          <input type="date" class="ex-date-input" value="${today}">
        </div>
        <div class="set-table">
          <div class="set-table-rows"></div>
        </div>
        <button class="add-set-btn" data-cardid="${cardId}" onclick="addSetToCard(this.dataset.cardid)">+ Add Set</button>
        <button class="ex-save-btn" data-cardid="${cardId}" data-exname="${ex.name.replace(/\`/g,'')}" onclick="saveCardEntry(this.dataset.cardid, this.dataset.exname)">Save Entry</button>
        ${prevHtml}
      </div>
    `;
    container.appendChild(card);
    for (let i = 0; i < 1; i++) addSetToCard(cardId);
  });

  const addCard = document.createElement('div');
  addCard.className = 'add-ex-card';
  addCard.id = 'ex-add-card';
  addCard.onclick = openAddExerciseModal;
  addCard.innerHTML = `
    <div class="add-ex-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
    <div class="add-ex-label">Add Exercise</div>
  `;
  container.appendChild(addCard);
}

function _stepperRow(cardId, n) {
  const row = document.createElement('div');
  row.className = 'set-row';
  row.innerHTML = `
    <div class="set-row-num">${n}</div>
    <div class="set-stepper-group">
      <div class="set-stepper-wrap">
        <div class="set-stepper-label">Reps</div>
        <div class="set-stepper">
          <button class="stepper-btn set-reps-dec" type="button">−</button>
          <div class="stepper-val set-reps" contenteditable="true" inputmode="numeric">0</div>
          <button class="stepper-btn set-reps-inc" type="button">+</button>
        </div>
      </div>
      <div class="set-divider"></div>
      <div class="set-stepper-wrap">
        <div class="set-stepper-label">lbs</div>
        <div class="set-stepper">
          <button class="stepper-btn set-weight-dec" type="button">−</button>
          <div class="stepper-val set-weight" contenteditable="true" inputmode="numeric">0</div>
          <button class="stepper-btn set-weight-inc" type="button">+</button>
        </div>
      </div>
    </div>
    <button class="set-row-dupe" type="button" title="Duplicate set">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </button>
    <button class="set-row-del" type="button" title="Remove set">×</button>
  `;

  // Wire stepper buttons
  const repsEl   = row.querySelector('.set-reps');
  const weightEl = row.querySelector('.set-weight');

  function getVal(el)       { return parseFloat(el.textContent) || 0; }
  function setVal(el, v, step) {
    const rounded = step === 2.5 ? Math.round(v / 2.5) * 2.5 : Math.round(v);
    el.textContent = Math.max(0, rounded);
  }

  row.querySelector('.set-reps-dec').addEventListener('click', () => setVal(repsEl,   getVal(repsEl)   - 1,   1));
  row.querySelector('.set-reps-inc').addEventListener('click', () => setVal(repsEl,   getVal(repsEl)   + 1,   1));
  row.querySelector('.set-weight-dec').addEventListener('click', () => setVal(weightEl, getVal(weightEl) - 2.5, 2.5));
  row.querySelector('.set-weight-inc').addEventListener('click', () => setVal(weightEl, getVal(weightEl) + 2.5, 2.5));

  // Inline edit: select all on focus, clamp on blur
  [repsEl, weightEl].forEach((el, i) => {
    const step = i === 0 ? 1 : 2.5;
    el.addEventListener('focus', () => {
      const range = document.createRange();
      range.selectNodeContents(el);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    });
    el.addEventListener('blur', () => setVal(el, getVal(el), step));
    el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } });
  });

  // Duplicate row — insert a copy with same values right after this row
  row.querySelector('.set-row-dupe').addEventListener('click', () => {
    const card = document.getElementById(cardId);
    const rows = card.querySelector('.set-table-rows');
    const reps = getVal(repsEl);
    const weight = getVal(weightEl);
    const n = rows.querySelectorAll('.set-row').length + 1;
    const newRow = _stepperRow(cardId, n);
    newRow.querySelector('.set-reps').textContent = reps;
    newRow.querySelector('.set-weight').textContent = weight;
    row.after(newRow);
    // Renumber all rows
    rows.querySelectorAll('.set-row .set-row-num').forEach((el, i) => el.textContent = i + 1);
  });

  // Delete row — renumber remaining rows
  row.querySelector('.set-row-del').addEventListener('click', () => {
    const card = document.getElementById(cardId);
    row.remove();
    card.querySelectorAll('.set-row .set-row-num').forEach((el, i) => el.textContent = i + 1);
  });

  return row;
}

function addSetToCard(cardId) {
  const card = document.getElementById(cardId);
  const rows = card.querySelector('.set-table-rows');
  const n = rows.querySelectorAll('.set-row').length + 1;
  rows.appendChild(_stepperRow(cardId, n));
}

function saveCardEntry(cardId, exerciseName) {
  const card = document.getElementById(cardId);
  const date = card.querySelector('.ex-date-input').value;
  if (!date) { alert('Pick a date.'); return; }
  const setRows = card.querySelectorAll('.set-row');
  const sets = [];
  setRows.forEach(row => {
    const reps   = (row.querySelector('.set-reps').textContent   || '').trim();
    const weight = (row.querySelector('.set-weight').textContent || '').trim();
    const r = parseFloat(reps) || 0, w = parseFloat(weight) || 0;
    if (r > 0 || w > 0) sets.push({ reps: r || '—', weight: w || '—' });
  });
  if (sets.length === 0) { alert('Add at least one set with reps or weight.'); return; }
  const data = getLogEntries();
  if (!data[exerciseName]) data[exerciseName] = [];
  data[exerciseName] = data[exerciseName].filter(e => e.date !== date);
  data[exerciseName].push({ date, sets });
  data[exerciseName].sort((a, b) => a.date.localeCompare(b.date));
  saveLogEntries(data);
  const btn = card.querySelector('.ex-save-btn');
  btn.textContent = '✓ Saved!';
  btn.style.background = 'var(--green)';
  setTimeout(() => { btn.textContent = 'Save Entry'; btn.style.background = ''; }, 1500);
  renderExerciseCards(currentDay);
  setTimeout(() => {
    const allIds = Array.from(document.getElementById('ex-scroll').children).map(c => c.id);
    const i = allIds.indexOf(cardId);
    const cards = document.querySelectorAll('.ex-card');
    if (cards[i]) cards[i].scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
  }, 50);
}

function clearEntries(exerciseName, cardId) {
  const data = getLogEntries();
  delete data[exerciseName];
  saveLogEntries(data);
  renderExerciseCards(currentDay);
  setTimeout(() => {
    const cards = Array.from(document.getElementById('ex-scroll').children);
    const i = cards.findIndex(c => c.id === cardId);
    if (cards[i]) cards[i].scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
  }, 50);
}

function bestSet(sets) {
  if (!sets || sets.length === 0) return null;
  let best = null;
  sets.forEach(s => {
    const w = parseFloat(s.weight) || 0, r = parseFloat(s.reps) || 0;
    if (!best || w > best.w || (w === best.w && r > best.r)) best = { w, r };
  });
  return best;
}

function removeExercise(idx, exerciseName) {
  if (!confirm(`Remove "${exerciseName}" from this day's workout?`)) return;
  ROUTINES[currentDay].exercises.splice(idx, 1);
  saveRoutines();
  renderExerciseCards(currentDay);
  renderExTabs(ROUTINES[currentDay].exercises);
  setTimeout(() => {
    const cards = document.getElementById('ex-scroll').children;
    // Land on whichever card now occupies this slot (or the previous one
    // if the removed exercise was last), falling back to the add card.
    const targetIdx = Math.max(0, Math.min(idx, ROUTINES[currentDay].exercises.length - 1));
    if (cards[targetIdx]) {
      cards[targetIdx].scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
      setActiveTab(targetIdx, false);
    }
  }, 50);
}

function openReplaceModal(exerciseName, cardIdx) {
  replaceExerciseName = exerciseName;
  replaceCardIndex = cardIdx;
  document.getElementById('replace-exercise-name').textContent = `Currently: ${exerciseName}`;
  const select = document.getElementById('replace-exercise-select');
  select.innerHTML = '<option value="">Select a new exercise...</option>' +
    ALL_EXERCISES.filter(ex => ex.name !== exerciseName)
      .map(ex => `<option value="${ex.name}">${ex.name}</option>`).join('');
  document.getElementById('replace-modal').classList.remove('hidden');
}

function confirmReplaceExercise() {
  const val = document.getElementById('replace-exercise-select').value;
  if (!val) { alert('Select an exercise.'); return; }
  const newEx = ALL_EXERCISES.find(ex => ex.name === val);
  ROUTINES[currentDay].exercises[replaceCardIndex] = { ...newEx };
  saveRoutines();
  closeReplaceModal();
  renderExerciseCards(currentDay);
  renderExTabs(ROUTINES[currentDay].exercises);
}

function closeReplaceModal() {
  document.getElementById('replace-modal').classList.add('hidden');
  replaceExerciseName = null; replaceCardIndex = null;
}

function closeReplaceModalOutside(e) {
  if (e.target === document.getElementById('replace-modal')) closeReplaceModal();
}

function openAddExerciseModal() {
  const existingNames = ROUTINES[currentDay].exercises.map(ex => ex.name);
  const select = document.getElementById('add-exercise-select');
  select.innerHTML = '<option value="">Select an exercise...</option>' +
    ALL_EXERCISES.filter(ex => !existingNames.includes(ex.name))
      .map(ex => `<option value="${ex.name}">${ex.name}</option>`).join('');
  document.getElementById('add-exercise-modal').classList.remove('hidden');
}

function confirmAddExercise() {
  const val = document.getElementById('add-exercise-select').value;
  if (!val) { alert('Select an exercise.'); return; }
  const newEx = ALL_EXERCISES.find(ex => ex.name === val);
  ROUTINES[currentDay].exercises.push({ ...newEx });
  saveRoutines();
  closeAddExerciseModal();
  renderExerciseCards(currentDay);
  renderExTabs(ROUTINES[currentDay].exercises);
  // Scroll to the newly added exercise card and highlight its tab.
  setTimeout(() => {
    const newIdx = ROUTINES[currentDay].exercises.length - 1;
    const cards = document.getElementById('ex-scroll').children;
    if (cards[newIdx]) cards[newIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    setActiveTab(newIdx);
  }, 50);
}

function closeAddExerciseModal() {
  document.getElementById('add-exercise-modal').classList.add('hidden');
}

function closeAddExerciseModalOutside(e) {
  if (e.target === document.getElementById('add-exercise-modal')) closeAddExerciseModal();
}

// ── Food panel ───────────────────────────────────────────────────────────────
function toggleFoodPanel() {
  if (document.body.classList.contains('food-open')) {
    closeFoodPanel();
  } else {
    openFoodPanel();
  }
}

function handleFoodFabClick() {
  // food-fab now does double duty: opens the panel when closed,
  // and closes it (showing an X) when open.
  toggleFoodPanel();
}

// Morphs #tab-bar-inner's width smoothly from its current size to whatever
// size the newly-rendered content (renderFn) naturally needs — used both
// when opening (workout tabs → nutrition tabs) and closing (nutrition tabs →
// workout tabs) so the pill always resizes instead of snapping instantly.
function _morphInnerToContent(renderFn) {
  const inner = document.getElementById('tab-bar-inner');

  // 1. Lock the current pixel width so we have a starting point to animate from
  const startWidth = inner.getBoundingClientRect().width;
  inner.style.transition = 'none';
  inner.style.width = startWidth + 'px';
  inner.style.minWidth = '0';
  inner.getBoundingClientRect(); // force layout

  // 2. Swap in the new content
  renderFn();

  // 3. Measure the natural width the new content wants, clamped to available space
  inner.style.width = 'auto';
  const naturalWidth = inner.getBoundingClientRect().width;
  // Max available = full bar width minus FAB (52px) minus gap (10px) minus bar padding (16px each side)
  const maxAvail = document.getElementById('tab-bar').getBoundingClientRect().width - 52 - 10 - 32;
  const targetWidth = Math.min(naturalWidth, maxAvail);
  inner.style.width = startWidth + 'px';
  inner.getBoundingClientRect(); // force layout
  inner.style.transition = '';

  // 4. Animate to the target width on the next frame
  requestAnimationFrame(() => {
    inner.style.width = targetWidth + 'px';
  });

  // 5. Once the animation finishes, release the locked width
  inner.addEventListener('transitionend', function cleanup(e) {
    if (e.propertyName !== 'width') return;
    inner.style.width = '';
    inner.style.minWidth = '';
    inner.removeEventListener('transitionend', cleanup);
  }, { once: true });
}

function openFoodPanel() {
  document.body.classList.add('food-open');
  _morphInnerToContent(renderFoodTabs);
}

function closeFoodPanel() {
  document.body.classList.remove('food-open');
  if (currentDay) {
    _morphInnerToContent(() => renderExTabs(ROUTINES[currentDay].exercises));
  } else {
    _morphInnerToContent(renderDayTabs);
  }
}

function updateHeaderDate() {
  const today = new Date();
  const dayName = today.toLocaleDateString('en-US', { weekday: 'short' });
  const date = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  document.getElementById('header-sub').textContent = `${dayName} · ${date}`;
}
updateHeaderDate();
renderDayCards();
renderDayTabs();

// Scroll to today's day on load
(function scrollToToday() {
  const JS_DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const todayName = JS_DAY_NAMES[new Date().getDay()];
  const todayIdx = DAY_ORDER.indexOf(todayName);
  if (todayIdx === -1) return;
  // Use requestAnimationFrame so the DOM has finished painting before we scroll
  requestAnimationFrame(() => {
    const scroll = document.querySelector('.day-scroll');
    const cards = scroll ? scroll.children : [];
    if (cards[todayIdx]) {
      cards[todayIdx].scrollIntoView({ behavior: 'instant', block: 'nearest', inline: 'center' });
    }
    setActiveTab(todayIdx, false);
  });
})();
